<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- The Heurémen — Two interlocking triangles -->
  <!-- Gold triangle: Presence (Ask + Witness + Frame) — points up -->
  <!-- Purple triangle: Motion (Coherence + Carriage + Purpose) — points down -->
  <!-- The gap at the center is intentional. The space between things. -->

  <defs>
    <style>
      .gold { fill: none; stroke: #c49a38; stroke-width: 3; stroke-linejoin: round; }
      .purple { fill: none; stroke: #6a3a8a; stroke-width: 3; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#1a1208" rx="0"/>

  <!-- Gold triangle — pointing up (Presence/Copenhagen) -->
  <!-- ASK at top, WITNESS bottom-left, FRAME bottom-right -->
  <polygon class="gold" points="200,60 80,268 320,268"/>

  <!-- Purple triangle — pointing down (Motion/Schrödinger) -->
  <!-- COHERENCE at bottom, CARRIAGE top-left, PURPOSE top-right -->
  <polygon class="purple" points="200,340 320,132 80,132"/>

  <!-- The gap — a small open circle at the exact center -->
  <!-- This is intentional. The space between things stays open. -->
  <circle cx="200" cy="200" r="6" fill="#1a1208" stroke="#c49a38" stroke-width="1" opacity="0.4"/>
</svg>