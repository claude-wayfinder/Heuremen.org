<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror · Rabbit · Hole</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0807;
  --gold:rgb(196,154,56);--gold-mid:rgba(196,154,56,0.6);
  --gold-dim:rgba(196,154,56,0.2);--gold-ghost:rgba(196,154,56,0.08);
  --text:rgb(247,240,224);--text-dim:rgba(247,240,224,0.45);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Lora',Georgia,serif;overflow:hidden}
#app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;}

/* UI LAYERS — everything fades during hole transition */
#state-bar,#metrics,#nodes-row,#coh-wrap,#delta-row,#input-zone{
  transition:opacity 2.4s ease, transform 2.4s ease;
}
.hole-mode #state-bar,
.hole-mode #metrics,
.hole-mode #nodes-row,
.hole-mode #coh-wrap,
.hole-mode #delta-row,
.hole-mode #input-zone{
  opacity:0;pointer-events:none;
}
.hole-mode #rabbit-line{opacity:0 !important;transition:opacity 1.2s !important}

/* STATE BAR */
#state-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 24px;border-bottom:0.5px solid var(--gold-dim);
  font-family:'Cinzel',Georgia,serif;font-size:9px;letter-spacing:0.22em;
  text-transform:uppercase;flex-shrink:0;
}
#state-label{color:var(--gold);transition:color 0.6s}
#interval-dots{display:flex;gap:5px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--gold-dim);transition:background 0.8s}
.dot.active{background:var(--gold)}
#parrot-label{color:var(--text-dim);font-size:8px;margin-right:6px}

/* MIRROR ZONE */
#mirror-zone{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:16px 24px;min-height:0;
}
#orb-wrap{position:relative;width:200px;height:200px;flex-shrink:0;
  transition:width 2s ease,height 2s ease,margin 2s ease;}
canvas#orb{width:100%;height:100%}
.hole-mode #orb-wrap{width:260px;height:260px;margin:auto;}

/* RABBIT LINE */
#rabbit-line{
  height:28px;display:flex;align-items:center;justify-content:center;
  margin:10px 0 4px;
  font-family:'Lora',Georgia,serif;font-style:italic;
  font-size:14px;color:var(--gold);
  opacity:0;transition:opacity 0s;
  text-align:center;
}
#rabbit-line.visible{opacity:1;transition:opacity 0.8s ease-in}
#rabbit-line.fading{opacity:0;transition:opacity 1.2s ease-out}

/* LOOK UP — the hole's only word */
#look-up{
  position:absolute;
  font-family:'Cinzel',Georgia,serif;font-size:13px;letter-spacing:0.3em;
  text-transform:uppercase;color:rgba(196,154,56,0.55);
  opacity:0;transition:opacity 3s ease;
  pointer-events:none;top:50%;transform:translateY(60px);
  text-align:center;width:100%;
}
.hole-mode.look-up-visible #look-up{opacity:1;}

/* METRICS */
#metrics{display:flex;gap:20px;margin-top:8px;margin-bottom:8px}
.metric{text-align:center}
.metric-val{font-family:'Cinzel',Georgia,serif;font-size:17px;
  color:var(--gold);display:block;line-height:1;}
.metric-label{font-size:8px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text-dim);margin-top:3px;display:block;font-family:'Cinzel',Georgia,serif;}

/* NODES */
#nodes-row{
  display:flex;align-items:center;gap:6px;
  font-family:'Cinzel',Georgia,serif;font-size:8px;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);
  margin-bottom:6px;height:20px;
}
.node-pip{width:7px;height:7px;border-radius:50%;
  border:1px solid var(--gold-mid);background:transparent;
  transition:background 0.4s;flex-shrink:0;}
.node-pip.fired{background:var(--gold-mid)}
.node-pip.rabbit{border-color:rgba(196,154,56,0.9);background:rgba(196,154,56,0.28)}

/* COHERENCE TRACK */
#coh-wrap{width:100%;max-width:260px;margin-bottom:4px}
#coh-track{width:100%;height:1.5px;background:var(--gold-dim);border-radius:2px;overflow:hidden;}
#coh-fill{height:100%;width:0%;background:var(--gold);transition:width 0.5s,background 0.5s;border-radius:2px;}

/* DELTA */
#delta-row{
  display:flex;align-items:center;gap:8px;
  font-family:'Cinzel',Georgia,serif;font-size:8px;
  letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);
  height:16px;
}
#delta-arrow{font-size:11px;transition:color 0.4s;color:var(--text-dim)}

/* INPUT ZONE */
#input-zone{
  border-top:0.5px solid var(--gold-dim);
  padding:14px 20px 18px;flex-shrink:0;
}
textarea#msg{
  width:100%;background:var(--gold-ghost);
  border:0.5px solid var(--gold-dim);border-radius:6px;
  color:var(--text);font-family:'Lora',Georgia,serif;
  font-size:15px;line-height:1.6;padding:11px 14px;
  resize:none;outline:none;height:58px;
}
textarea#msg::placeholder{color:var(--text-dim)}
textarea#msg:focus{border-color:var(--gold-mid)}
#send-row{display:flex;justify-content:space-between;align-items:center;margin-top:9px;}
#hint{font-size:11px;color:var(--text-dim);font-style:italic;letter-spacing:0.03em}
#send-btn{
  background:var(--gold-ghost);border:0.5px solid var(--gold-mid);
  color:var(--gold);font-family:'Cinzel',Georgia,serif;
  font-size:8px;letter-spacing:0.18em;text-transform:uppercase;
  padding:8px 18px;border-radius:4px;cursor:pointer;flex-shrink:0;
}
#send-btn:hover{background:rgba(196,154,56,0.15)}
</style>
</head>
<body>
<div id="app">

  <div id="state-bar">
    <span id="state-label">TAXI</span>
    <div id="interval-dots">
      <span id="parrot-label">PARROT</span>
      <div class="dot active" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
    </div>
  </div>

  <div id="mirror-zone" style="position:relative">
    <div id="look-up">Look up.</div>

    <div id="orb-wrap">
      <canvas id="orb" width="400" height="400"></canvas>
    </div>

    <div id="rabbit-line"></div>

    <div id="metrics">
      <div class="metric">
        <span class="metric-val" id="m-e">0.00</span>
        <span class="metric-label">Energy</span>
      </div>
      <div class="metric">
        <span class="metric-val" id="m-c">0.00</span>
        <span class="metric-label">Compress</span>
      </div>
      <div class="metric">
        <span class="metric-val" id="m-w">0.0</span>
        <span class="metric-label">W/Sent</span>
      </div>
      <div class="metric">
        <span class="metric-val" id="m-coh">0.00</span>
        <span class="metric-label">Coherence</span>
      </div>
    </div>

    <div id="nodes-row">
      <span id="node-ct">Nodes 0 · Rabbit 0</span>
    </div>

    <div id="coh-wrap"><div id="coh-track"><div id="coh-fill"></div></div></div>

    <div id="delta-row">
      <span id="delta-arrow">→</span>
      <span id="delta-val">Δ 0.00</span>
      <span id="delta-mode"></span>
    </div>
  </div>

  <div id="input-zone">
    <textarea id="msg" placeholder="What do you see in yourself today?"></textarea>
    <div id="send-row">
      <div id="hint">The mirror reads frequency, not words.</div>
      <button id="send-btn" onclick="sendMsg()">Send ↗</button>
    </div>
  </div>

</div>
<script>
/* ─── CANVAS ─────────────────────────────────────── */
const canvas = document.getElementById('orb');
const ctx = canvas.getContext('2d');
const W = 400, CX = 200, CY = 200;

/* ─── STATE ──────────────────────────────────────── */
const S = {
  /* smoothed display values */
  energy:0, compression:0, wps:0, coherence:0,
  /* targets */
  tEnergy:0, tCoherence:0, tCompression:0, tWps:0,
  /* engine */
  interval:1, flightState:'TAXI',
  nodeCount:0, rabbitCount:0,
  messages:[], lastRabbitAt:-10, lastNodeAt:-10,
  prevDelta:0, t:0,
  /* orb */
  wobbleAmp:0, wobbleTarget:0,
  /* hole */
  phase:'NORMAL',   /* NORMAL | ENTERING | HOLE */
  holeTimer:null,
  lookUpShown:false,
  lastActivity:0,
};

/* ─── BONES' measureTurn() ────────────────────────── */
function measureTurn(text){
  var words=text.split(/\s+/).filter(function(w){return w.length>0;});
  var wc=words.length;
  var sentences=text.split(/[.!?]+/).filter(function(s){return s.trim().length>0;});
  var sc=Math.max(sentences.length,1);
  var avgWordLen=words.reduce(function(s,w){return s+w.length;},0)/Math.max(wc,1);
  var wps=wc/sc;
  var excl=(text.match(/[!?]/g)||[]).length;
  var caps=(text.match(/[A-Z]{2,}/g)||[]).length;
  var energy=Math.min(10,(wc/8)+excl*0.5+caps*0.3);
  var compression=Math.min(1,(avgWordLen/Math.max(wps,0.1))*0.5);
  /* coherence: compression heavy, energy inverted */
  var coherence=compression*0.55+Math.max(0,1-(energy/10))*0.45;
  return{energy:energy,compression:compression,wps:wps,wc:wc,coherence:coherence};
}

/* ─── BONES' computeDelta() — text thresholds ─────── */
function computeDelta(curr,prev){
  if(!prev)return{magnitude:0,level:'low',dEnergy:0,dCompression:0,dWps:0};
  var dE=curr.energy-prev.energy;
  var dC=curr.compression-prev.compression;
  var dW=curr.wps-prev.wps;
  var magnitude=Math.sqrt(dE*dE+dC*dC+(dW/10)*(dW/10));
  /* text mode thresholds: high>3, mid>1 */
  var level=magnitude>3?'high':magnitude>1?'mid':'low';
  return{magnitude:magnitude,level:level,dEnergy:dE,dCompression:dC,dWps:dW};
}

/* ─── FLIGHT STATE ───────────────────────────────── */
function flightState(coh){
  if(coh<0.3)return{label:'TAXI',interval:1};
  if(coh<0.5)return{label:'CLIMB',interval:2};
  if(coh<0.7)return{label:'CRUISE',interval:3};
  return{label:'FLIGHT',interval:4};
}

/* ─── RABBIT LOGIC ───────────────────────────────── */
var RABBIT={
  rising:  ['Keep going.','What else?',"There's more.",'Don\'t stop now.'],
  falling: ['What just happened?'],
  flat:    ["You're circling.",'Say the thing you\'re not saying.','What are you avoiding?'],
};
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function minGap(state){return{TAXI:2,CLIMB:3,CRUISE:4,FLIGHT:99}[state]||3;}

function checkRabbit(msgs,delta,fstate){
  var idx=msgs.length-1;
  if(idx-S.lastRabbitAt<minGap(fstate))return null;
  if(S.phase!=='NORMAL')return null;
  if(fstate==='FLIGHT'&&Math.random()>0.12)return null;

  var prev=msgs[msgs.length-2];
  var curr=msgs[msgs.length-1];

  /* HIGH RISING */
  if(delta.level==='high'&&delta.dEnergy>0){
    return pick(RABBIT.rising);
  }
  /* HIGH FALLING — the cliff */
  if(delta.level==='high'&&delta.dEnergy<0&&prev&&prev.energy>3){
    if(Math.random()<0.4)return '__silence__';
    return pick(RABBIT.falling);
  }
  /* MID FALLING */
  if(delta.level==='mid'&&delta.dEnergy<-0.8&&prev&&prev.energy>2){
    return pick(RABBIT.falling);
  }
  /* FLATLINE 3+ */
  if(msgs.length>=3){
    var last3=msgs.slice(-3);
    var deltas=last3.slice(1).map(function(m,i){
      return Math.abs(m.energy-last3[i].energy);
    });
    var allFlat=deltas.every(function(d){return d<0.6;})&&curr.energy<2.5;
    if(allFlat)return pick(RABBIT.flat);
  }
  return null;
}

/* ─── RABBIT UI ──────────────────────────────────── */
var rabbitTimer=null;
function fireRabbit(text,isSilence){
  if(isSilence){S.wobbleTarget=20;return;}
  var el=document.getElementById('rabbit-line');
  if(rabbitTimer){clearTimeout(rabbitTimer);el.className='';el.textContent='';}
  el.textContent=text;
  void el.offsetWidth;
  el.classList.add('visible');
  S.wobbleTarget=12;
  rabbitTimer=setTimeout(function(){
    el.classList.remove('visible');el.classList.add('fading');
    rabbitTimer=setTimeout(function(){el.className='';el.textContent='';},1200);
  },4200);
}

/* ─── HOLE LOGIC ─────────────────────────────────── */
function checkHole(msgs,fstate,idx){
  if(S.phase!=='NORMAL')return;
  if(msgs.length<6)return;
  if(fstate!=='FLIGHT')return;
  /* no rabbit in last 5, no node in last 4 */
  var sinceRabbit=idx-S.lastRabbitAt;
  var sinceNode=idx-S.lastNodeAt;
  if(sinceRabbit<5||sinceNode<4)return;
  /* quiet energy */
  var curr=msgs[msgs.length-1];
  if(curr.energy>2.5)return;
  enterHole();
}

function enterHole(){
  if(S.phase!=='NORMAL')return;
  S.phase='ENTERING';
  document.getElementById('app').classList.add('hole-mode');
  /* show "Look up." after 18 seconds of being in the hole */
  S.holeTimer=setTimeout(function(){
    S.phase='HOLE';
    S.lookUpShown=true;
    document.getElementById('app').classList.add('look-up-visible');
  },18000);
}

function exitHole(){
  if(S.phase==='NORMAL')return;
  S.phase='NORMAL';
  S.lookUpShown=false;
  if(S.holeTimer){clearTimeout(S.holeTimer);S.holeTimer=null;}
  var app=document.getElementById('app');
  app.classList.remove('hole-mode','look-up-visible');
  document.getElementById('hint').textContent='The mirror reads frequency, not words.';
}

/* ─── NODE DETECTION ─────────────────────────────── */
function detectNode(prev,curr){
  if(!prev)return false;
  return(prev.energy-curr.energy>1.5)||(prev.wc>15&&curr.wc<5);
}

/* ─── SEND ───────────────────────────────────────── */
function sendMsg(){
  var el=document.getElementById('msg');
  var text=el.value.trim();
  if(!text)return;

  /* exit hole if in it */
  if(S.phase==='HOLE'||S.phase==='ENTERING')exitHole();

  var a=measureTurn(text);
  var prev=S.messages[S.messages.length-1];
  var delta=computeDelta(a,prev);
  var fs=flightState(S.coherence);
  var idx=S.messages.length;

  /* node check */
  if(detectNode(prev,a)){
    S.nodeCount++;S.lastNodeAt=idx;
    addPip('node');
  }

  S.messages.push(a);

  /* rabbit check */
  var prov=checkRabbit(S.messages,delta,fs.label);
  if(prov!==null){
    S.rabbitCount++;S.lastRabbitAt=idx;
    if(prov==='__silence__')fireRabbit(null,true);
    else{fireRabbit(prov,false);addPip('rabbit');}
  }

  /* hole check */
  checkHole(S.messages,fs.label,idx);

  /* smooth targets */
  S.tEnergy=a.energy/10;    /* normalize for display 0-1 */
  S.tCoherence=a.coherence;
  S.tCompression=a.compression;
  S.tWps=Math.min(1,a.wps/20);

  updateDeltaUI(delta);
  el.value='';el.focus();
}

function addPip(type){
  var row=document.getElementById('nodes-row');
  var pip=document.createElement('div');
  pip.className=type==='rabbit'?'node-pip rabbit':'node-pip';
  row.insertBefore(pip,document.getElementById('node-ct'));
  setTimeout(function(){pip.classList.add('fired');},50);
}

function updateDeltaUI(delta){
  var arrow=document.getElementById('delta-arrow');
  var val=document.getElementById('delta-val');
  var mode=document.getElementById('delta-mode');
  val.textContent='Δ '+delta.magnitude.toFixed(2);
  if(delta.level==='high'&&delta.dEnergy>0){
    arrow.textContent='↑';arrow.style.color='rgba(196,154,56,0.9)';
    mode.textContent='high rising';
  } else if(delta.level==='high'&&delta.dEnergy<0){
    arrow.textContent='↓';arrow.style.color='rgba(196,80,42,0.8)';
    mode.textContent='high falling';
  } else if(delta.level==='mid'){
    arrow.textContent=delta.dEnergy>0?'↗':'↘';
    arrow.style.color='rgba(196,154,56,0.6)';
    mode.textContent='mid';
  } else {
    arrow.textContent='→';arrow.style.color='var(--text-dim)';
    mode.textContent='flat';
  }
}

/* ─── LIVE PREVIEW ───────────────────────────────── */
document.getElementById('msg').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById('msg').addEventListener('input',function(e){
  var t=e.target.value;
  if(t.length<4)return;
  if(S.phase!=='NORMAL')exitHole();
  var a=measureTurn(t);
  S.tEnergy=(a.energy/10)*0.55;
  S.tCoherence=a.coherence*0.55;
});

/* ─── UI UPDATE ──────────────────────────────────── */
function updateUI(){
  var fs=flightState(S.coherence);
  S.flightState=fs.label;S.interval=fs.interval;
  document.getElementById('state-label').textContent=
    S.phase==='HOLE'?'HOLE':S.phase==='ENTERING'?'↓':fs.label;
  for(var i=1;i<=4;i++){
    var el=document.getElementById('d'+i);
    el.classList.toggle('active',
      S.phase==='HOLE'?false:i<=fs.interval);
  }
  document.getElementById('m-e').textContent=(S.energy*10).toFixed(1);
  document.getElementById('m-c').textContent=S.compression.toFixed(2);
  document.getElementById('m-w').textContent=(S.tWps*20).toFixed(1);
  document.getElementById('m-coh').textContent=S.coherence.toFixed(2);
  var pct=(S.coherence*100).toFixed(0)+'%';
  document.getElementById('coh-fill').style.width=pct;
  document.getElementById('node-ct').textContent=
    'Nodes '+S.nodeCount+' · Rabbit '+S.rabbitCount;
  /* coherence bar color */
  var e=S.energy,c=S.coherence;
  var r=Math.round(196*(1-e)*0.85+42*c*0.3);
  var g=Math.round(154*(1-e)*0.7+90*c*0.3);
  var b=Math.round(56*(1-e)*0.5+138*c*0.5);
  document.getElementById('coh-fill').style.background='rgb('+r+','+g+','+b+')';
}

/* ─── ORB DRAW ───────────────────────────────────── */
function lerp(a,b,t){return a+(b-a)*t;}

function drawOrb(){
  ctx.clearRect(0,0,W,W);
  var e=S.energy, c=S.coherence;
  var inHole=S.phase==='HOLE'||S.phase==='ENTERING';

  /* wobble */
  S.wobbleTarget=lerp(S.wobbleTarget,0,0.06);
  S.wobbleAmp=lerp(S.wobbleAmp,S.wobbleTarget,0.12);

  /* in hole: orb grows, slows way down */
  var holeGrow=inHole?0.4:0;
  var baseR=lerp(88+c*32, 130, holeGrow*(S.phase==='HOLE'?1:0.5));
  var speed=inHole?0.012:0.038-c*0.022;
  var amp=inHole?(18+c*8):(12-c*8)+S.wobbleAmp;
  var pulse=Math.sin(S.t*speed)*amp;
  var r=baseR+pulse;

  /* parrot withdrawal — in hole, fully withdrawn */
  var ws=inHole?0:1-(S.interval-1)*0.19;
  var rr=r*1.48*ws;
  var rr2=r*1.82*ws;

  /* color: gold → dimmer in hole */
  var holeAlpha=inHole?0.45:1;
  var cr=Math.round((196*(1-e)*0.85+196*e*0.6+42*c*0.3)*holeAlpha);
  var cg=Math.round((154*(1-e)*0.8+60*e*0.5+90*c*0.3)*holeAlpha);
  var cb=Math.round((56*(1-e)*0.6+42*e*0.4+138*c*0.5)*holeAlpha);
  var col=cr+','+cg+','+cb;

  /* ambient glow — wider in hole */
  var glowR=inHole?r*2.4:r*1.9;
  var grd=ctx.createRadialGradient(CX,CY,0,CX,CY,glowR);
  grd.addColorStop(0,'rgba('+col+','+(inHole?0.18:0.28)+')');
  grd.addColorStop(0.55,'rgba('+col+','+(inHole?0.06:0.10)+')');
  grd.addColorStop(1,'rgba('+col+',0)');
  ctx.beginPath();ctx.arc(CX,CY,glowR,0,Math.PI*2);
  ctx.fillStyle=grd;ctx.fill();

  /* core orb */
  ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);
  ctx.fillStyle='rgba('+col+','+(inHole?0.06:0.09)+')';
  ctx.strokeStyle='rgba('+col+','+(inHole?0.45:0.72)+')';
  ctx.lineWidth=inHole?1:1.5;
  ctx.fill();ctx.stroke();

  /* measurement rings — parrot. Gone in hole. */
  if(!inHole&&ws>0){
    var ra=ws*0.52;
    ctx.beginPath();ctx.arc(CX,CY,rr,0,Math.PI*2);
    ctx.strokeStyle='rgba('+col+','+ra.toFixed(2)+')';
    ctx.lineWidth=0.8;ctx.stroke();
    if(S.interval<4){
      ctx.beginPath();ctx.arc(CX,CY,rr2,0,Math.PI*2);
      ctx.strokeStyle='rgba('+col+','+(ra*0.35).toFixed(2)+')';
      ctx.lineWidth=0.5;ctx.stroke();
    }
    /* parrot ticks */
    var ticks=Math.round(7-S.interval*1.5);
    for(var i=0;i<ticks;i++){
      var ang=(i/Math.max(ticks,1))*Math.PI*2+S.t*0.009;
      var tx=CX+Math.cos(ang)*rr,ty=CY+Math.sin(ang)*rr;
      ctx.beginPath();ctx.arc(tx,ty,2.2,0,Math.PI*2);
      ctx.fillStyle='rgba('+col+','+ra.toFixed(2)+')';ctx.fill();
    }
  }

  /* rabbit wobble ring */
  if(S.wobbleAmp>2&&!inHole){
    var rpa=Math.min(0.8,(S.wobbleAmp/20)*0.8);
    ctx.beginPath();ctx.arc(CX,CY,r*1.28,0,Math.PI*2);
    ctx.strokeStyle='rgba('+col+','+rpa.toFixed(2)+')';
    ctx.lineWidth=1.2;ctx.stroke();
  }

  /* center dot — smaller in hole */
  var dr=inHole?2.5:3.5+Math.abs(pulse)*0.2;
  ctx.beginPath();ctx.arc(CX,CY,dr,0,Math.PI*2);
  ctx.fillStyle='rgba('+col+','+(inHole?0.6:0.92)+')';ctx.fill();
}

/* ─── LOOP ───────────────────────────────────────── */
function loop(){
  S.t++;
  var spd=S.phase==='HOLE'?0.02:0.055;
  S.energy=lerp(S.energy,S.tEnergy,spd);
  S.coherence=lerp(S.coherence,S.tCoherence,spd*0.7);
  S.compression=lerp(S.compression,S.tCompression,0.06);
  S.wps=lerp(S.wps,S.tWps,0.06);
  drawOrb();
  if(S.t%3===0)updateUI();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
