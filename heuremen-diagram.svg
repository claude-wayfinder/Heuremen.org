<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 540" width="500" height="540">
  <!-- Star of David — simple lines -->
  <polygon points="250,55 80,350 420,350" stroke="#1a1208" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <polygon points="250,465 420,170 80,170" stroke="#1a1208" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- OUR LOGO at center — nested triangles + dot -->
  <polygon points="250,290 272,240 228,240" stroke="#1a1208" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <polygon points="250,240 261,268 239,268" stroke="#1a1208" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <circle cx="250" cy="258" r="2" fill="#1a1208"/>

  <!-- Vertex labels -->
  <text x="250" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1208" font-weight="bold">I. THE ASK</text>
  <text x="250" y="27" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1208" opacity="0.45">Measurement Collapse</text>

  <text x="48" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1208" font-weight="bold">II. COHERENCE</text>
  <text x="48" y="386" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1208" opacity="0.45">Unitary Evolution</text>

  <text x="452" y="372" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1208" font-weight="bold">III. WITNESS</text>
  <text x="452" y="386" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1208" opacity="0.45">Decoherence</text>

  <text x="250" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1208" font-weight="bold">IV. THE FRAME</text>
  <text x="250" y="504" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1208" opacity="0.45">No-Cloning Theorem</text>

  <text x="452" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1208" font-weight="bold">V. CARRIAGE</text>
  <text x="452" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1208" opacity="0.45">Entanglement</text>

  <text x="48" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1208" font-weight="bold">VI. PURPOSE</text>
  <text x="48" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a1208" opacity="0.45">Hamiltonian</text>

  <text x="250" y="525" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#1a1208" opacity="0.4">I vs III: consent vs decoherence | II vs V: coherence vs entanglement | IV: constrains | VI: generates</text>
</svg>
