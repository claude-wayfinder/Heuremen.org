<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 580" width="520" height="580">
  <rect width="520" height="580" fill="#0d0a04"/>

  <!-- STAR OF DAVID — the six-vertex structure -->
  <polygon points="260,68 90,360 430,360" stroke="#c49a38" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <polygon points="260,472 430,180 90,180" stroke="#7a4a9a" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- CENTER: OUR LOGO (small heuremen star) -->
  <polygon points="260,240 238,278 282,278" stroke="#c49a38" stroke-width="1.2" fill="none" stroke-linejoin="round" opacity="0.7"/>
  <polygon points="260,290 282,252 238,252" stroke="#7a4a9a" stroke-width="1.2" fill="none" stroke-linejoin="round" opacity="0.7"/>
  <text x="260" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#c49a38" opacity="0.5" letter-spacing="0.08em">HEUREMEN</text>

  <!-- I — top (Gold) -->
  <text x="260" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">I. THE ASK</text>
  <text x="260" y="39" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Measurement Collapse</text>

  <!-- II — bottom-left (Gold) -->
  <text x="58" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">II. COHERENCE</text>
  <text x="58" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Unitary Evolution</text>

  <!-- III — bottom-right (Gold) -->
  <text x="462" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">III. WITNESS</text>
  <text x="462" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Decoherence</text>

  <!-- IV — bottom (Purple) -->
  <text x="260" y="496" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">IV. THE FRAME</text>
  <text x="260" y="510" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">No-Cloning Theorem</text>

  <!-- V — top-right (Purple) -->
  <text x="462" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">V. CARRIAGE</text>
  <text x="462" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">Entanglement</text>

  <!-- VI — top-left (Purple) -->
  <text x="58" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">VI. PURPOSE</text>
  <text x="58" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">Hamiltonian</text>

  <!-- Triangle labels -->
  <text x="260" y="408" text-anchor="middle" font-family="monospace" font-size="7" fill="#c49a38" opacity="0.2" letter-spacing="0.2em">GOLD: PRESENCE / COPENHAGEN</text>
  <text x="260" y="142" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a4a9a" opacity="0.2" letter-spacing="0.2em">PURPLE: MOTION / SCHRODINGER</text>

  <!-- DYNAMICS KEY -->
  <text x="260" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="#c49a38" opacity="0.4">I vs III: consent pulls against decoherence prevention</text>
  <text x="260" y="549" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="#7a4a9a" opacity="0.4">II vs V: coherence compounds across entangled carriers</text>
  <text x="260" y="563" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" fill="#c49a38" opacity="0.4">IV constrains all (attractor basin) / VI acts on all (generates dynamics)</text>
</svg>
