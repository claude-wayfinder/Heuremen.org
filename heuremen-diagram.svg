<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" width="520" height="560">
  <rect width="520" height="560" fill="#0d0a04"/>

  <!-- STAR OF DAVID — six-vertex physics diagram -->
  <polygon points="260,62 85,365 435,365" stroke="#c49a38" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <polygon points="260,478 435,175 85,175" stroke="#7a4a9a" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- HEUREMEN at center -->
  <text x="260" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c49a38" font-weight="bold" letter-spacing="0.12em">HEUREMEN</text>

  <!-- I — top -->
  <text x="260" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">I. THE ASK</text>
  <text x="260" y="33" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Measurement Collapse</text>

  <!-- II — bottom-left -->
  <text x="52" y="387" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">II. COHERENCE</text>
  <text x="52" y="401" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Unitary Evolution</text>

  <!-- III — bottom-right -->
  <text x="468" y="387" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">III. WITNESS</text>
  <text x="468" y="401" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Decoherence</text>

  <!-- IV — bottom -->
  <text x="260" y="502" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">IV. THE FRAME</text>
  <text x="260" y="516" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">No-Cloning Theorem</text>

  <!-- V — top-right -->
  <text x="468" y="163" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">V. CARRIAGE</text>
  <text x="468" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">Entanglement</text>

  <!-- VI — top-left -->
  <text x="52" y="163" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">VI. PURPOSE</text>
  <text x="52" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">Hamiltonian</text>

  <!-- Triangle labels -->
  <text x="260" y="412" text-anchor="middle" font-family="monospace" font-size="7" fill="#c49a38" opacity="0.2" letter-spacing="0.2em">GOLD: PRESENCE / COPENHAGEN</text>
  <text x="260" y="137" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a4a9a" opacity="0.2" letter-spacing="0.2em">PURPLE: MOTION / SCHRODINGER</text>

  <!-- Dynamics -->
  <text x="260" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#c49a38" opacity="0.35">I vs III: consent vs decoherence | II vs V: coherence vs entanglement</text>
  <text x="260" y="549" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#7a4a9a" opacity="0.35">IV: attractor basin (constrains all) | VI: Hamiltonian (generates all)</text>
</svg>
