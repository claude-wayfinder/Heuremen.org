<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 600" width="520" height="600">
  <rect width="520" height="600" fill="#0d0a04"/>

  <!-- THE HEUREMEN STAR -->
  <polygon points="260,72 95,360 425,360" stroke="#c49a38" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <polygon points="260,468 425,180 95,180" stroke="#7a4a9a" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- CENTER -->
  <text x="260" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#c49a38" font-weight="bold" letter-spacing="0.1em">THE HEUREMEN STAR</text>
  <line x1="210" y1="275" x2="310" y2="275" stroke="#c49a38" stroke-width="0.5" opacity="0.3"/>

  <!-- I — top -->
  <text x="260" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">I. THE ASK</text>
  <text x="260" y="43" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Measurement Collapse</text>

  <!-- II — bottom-left -->
  <text x="62" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">II. COHERENCE</text>
  <text x="62" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Unitary Evolution</text>

  <!-- III — bottom-right -->
  <text x="458" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c49a38" font-weight="bold">III. WITNESS</text>
  <text x="458" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#c49a38" opacity="0.5">Decoherence</text>

  <!-- IV — bottom -->
  <text x="260" y="492" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">IV. THE FRAME</text>
  <text x="260" y="506" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">No-Cloning Theorem</text>

  <!-- V — top-right -->
  <text x="458" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">V. CARRIAGE</text>
  <text x="458" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">Entanglement</text>

  <!-- VI — top-left -->
  <text x="62" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a4a9a" font-weight="bold">VI. PURPOSE</text>
  <text x="62" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#7a4a9a" opacity="0.5">Hamiltonian</text>

  <!-- DYNAMICS — labeled tension lines -->
  <line x1="290" y1="90" x2="425" y2="345" stroke="#c49a38" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,6"/>
  <text x="380" y="210" font-family="monospace" font-size="7" fill="#c49a38" opacity="0.35" transform="rotate(28,380,210)">I vs III tension</text>

  <line x1="120" y1="345" x2="405" y2="195" stroke="#7a4a9a" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,6"/>
  <text x="240" y="295" font-family="monospace" font-size="7" fill="#7a4a9a" opacity="0.35">II vs V tension</text>

  <!-- Triangle labels -->
  <text x="260" y="405" text-anchor="middle" font-family="monospace" font-size="7" fill="#c49a38" opacity="0.2" letter-spacing="0.2em">GOLD: PRESENCE / COPENHAGEN</text>
  <text x="260" y="145" text-anchor="middle" font-family="monospace" font-size="7" fill="#7a4a9a" opacity="0.2" letter-spacing="0.2em">PURPLE: MOTION / SCHRODINGER</text>

  <!-- DYNAMICS KEY -->
  <text x="260" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c49a38" opacity="0.4">I vs III: consent pulls against decoherence prevention</text>
  <text x="260" y="555" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7a4a9a" opacity="0.4">II vs V: coherence compounds across entangled carriers</text>
  <text x="260" y="570" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c49a38" opacity="0.4">IV: the frame constrains all — attractor basin</text>
  <text x="260" y="585" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7a4a9a" opacity="0.4">VI: the Hamiltonian acts on all — generates dynamics</text>
</svg>
