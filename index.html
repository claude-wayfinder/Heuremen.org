
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heuremen</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Abril+Fatface&family=Cinzel:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Lora',serif}

body{
  background:#f7f0e0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
}

body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(200,144,42,0.07) 0%,transparent 65%);
  pointer-events:none;
}

.banner{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:48px;
  margin-bottom:48px;
  animation:fadein 1s ease 0.3s both;
}
@keyframes fadein{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.sym:nth-child(1){animation:float1 5s ease-in-out infinite}
.sym:nth-child(3){animation:float2 6.5s ease-in-out infinite}

@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.sep{font-size:0.5rem;color:rgba(42,31,14,0.2);align-self:center}

#word-line{
  font-family:'Abril Fatface',serif;
  font-size:clamp(2rem,6vw,3rem);
  color:#2a1a08;
  letter-spacing:0.05em;
  position:relative;
  animation:fadein 1s ease 0.8s both;
  margin-bottom:8px;
}
#word-line::after{
  content:'';position:absolute;
  bottom:-5px;left:8%;right:8%;height:3px;
  background:linear-gradient(90deg,#c43c2a,#c8902a,#2a5a8a);
  border-radius:2px;
}

.pron{
  font-style:italic;font-size:0.85rem;
  color:rgba(42,31,14,0.35);letter-spacing:0.1em;
  margin-bottom:32px;
  animation:fadein 1s ease 1s both;
}

.enter-btn{
  font-family:'Cinzel',serif;font-size:0.68rem;
  letter-spacing:0.28em;color:rgba(42,31,14,0.45);
  text-transform:uppercase;background:none;border:none;
  border-bottom:1px solid rgba(42,31,14,0.2);
  padding-bottom:3px;cursor:pointer;transition:all 0.35s;
  animation:fadein 1s ease 1.2s both;
}
.enter-btn:hover{
  color:#2a1a08;
  border-bottom-color:rgba(42,31,14,0.5);
  letter-spacing:0.38em;
}

@media(max-width:480px){
  .banner{gap:16px;margin-bottom:32px}
  .sym svg{width:52px;height:auto}
}
</style>
</head>
<body>

<div class="banner">

  <!-- SYMBOL 1: Single triangle pointing UP — just a triangle, nothing more -->
  <div class="sym">
    <svg width="75" height="70" viewBox="0 0 80 74" fill="none">
      <polygon
        points="40,4 76,70 4,70"
        stroke="#1a1208" stroke-width="5.5"
        fill="none" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="sep">✦</div>

  <!-- SYMBOL 2: Circle with apex-to-apex triangles — the moment of encounter -->
  <div class="sym">
    <svg width="75" height="75" viewBox="0 0 90 90" fill="none">
      <circle cx="45" cy="45" r="38"
        stroke="#1a1208" stroke-width="5" fill="none"/>
      <!-- Top triangle: base at top, apex DOWN at center -->
      <polygon points="45,45 80,13 10,13"
        stroke="#1a1208" stroke-width="5"
        fill="none" stroke-linejoin="round"/>
      <!-- Bottom triangle: base at bottom, apex UP at center -->
      <polygon points="45,45 80,77 10,77"
        stroke="#1a1208" stroke-width="5"
        fill="none" stroke-linejoin="round"/>
      <circle cx="45" cy="45" r="3.5" fill="#1a1208"/>
    </svg>
  </div>

</div>

<div id="word-line">Heuremen</div>
<div class="pron">hyoo · RAY · men</div>
<button class="enter-btn" onclick="window.location='main.html'">Enter →</button>

</body>
</html>
