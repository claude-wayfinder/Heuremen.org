<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Companion</title>
<meta name="description" content="A thinking partner that talks back. Two modes: Biscuit (sassy science) and Bread (gut truth).">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Abril+Fatface&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="heuremen.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e0d0;font-family:'Lora',serif;overflow:hidden;height:100vh;height:100dvh}

/* ─── SPLASH SCREEN ─────────────────────────────────────────── */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:#0a0a0f;transition:opacity 0.6s ease,transform 0.6s ease}
.splash.gone{opacity:0;transform:scale(1.1);pointer-events:none}

.splash-pick{display:flex;gap:24px;margin-top:0}

.splash-orb{position:relative;width:220px;height:220px;border-radius:50%;cursor:pointer;transition:all 0.4s ease;display:flex;align-items:center;justify-content:center;flex-direction:column}
.splash-orb:active{transform:scale(0.95)}

/* Biscuit orb — warm pink/gold */
.splash-orb.biscuit{
  background:radial-gradient(circle at 40% 35%, #ffb347 0%, #ff6b9d 45%, #c44569 100%);
  box-shadow:0 0 60px rgba(255,107,157,0.3),0 0 120px rgba(255,107,157,0.1);
  animation:float-b 4s ease-in-out infinite;
}
.splash-orb.biscuit:hover{box-shadow:0 0 80px rgba(255,107,157,0.5),0 0 160px rgba(255,107,157,0.2)}

/* Bread orb — warm earth/amber */
.splash-orb.bread{
  background:radial-gradient(circle at 40% 35%, #f5deb3 0%, #d4a574 45%, #8b6914 100%);
  box-shadow:0 0 60px rgba(212,165,116,0.3),0 0 120px rgba(212,165,116,0.1);
  animation:float-r 4s ease-in-out infinite 1s;
}
.splash-orb.bread:hover{box-shadow:0 0 80px rgba(212,165,116,0.5),0 0 160px rgba(212,165,116,0.2)}

@keyframes float-b{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes float-r{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* Texture overlay for biscuit crumb look */
.splash-orb::before{
  content:'';position:absolute;inset:8px;border-radius:50%;
  background:radial-gradient(circle at 30% 25%,rgba(255,255,255,0.15) 0%,transparent 50%);
  pointer-events:none;
}
/* Crispy edge */
.splash-orb::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(255,255,255,0.08);
  pointer-events:none;
}

.orb-label{font-family:'Abril Fatface',serif;font-size:1.6rem;color:rgba(255,255,255,0.9);text-shadow:0 2px 8px rgba(0,0,0,0.5);z-index:1;letter-spacing:0.02em}
.orb-sub{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.2em;margin-top:6px;z-index:1}

.splash-title{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:40px}

.splash-hint{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:rgba(255,255,255,0.15);margin-top:50px;letter-spacing:0.15em}

/* ─── PARTICLES (subtle floating dots) ───────────────────────── */
.particles{position:fixed;inset:0;pointer-events:none;z-index:99}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;opacity:0;animation:drift 8s ease-in-out infinite}
@keyframes drift{0%{opacity:0;transform:translateY(0)}20%{opacity:0.4}80%{opacity:0.4}100%{opacity:0;transform:translateY(-200px)}}

/* ─── APP (chat interface, hidden initially) ─────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;opacity:0;transition:opacity 0.5s ease;pointer-events:none}
.app.active{opacity:1;pointer-events:all}

/* TOP BAR */
.top{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:rgba(10,10,15,0.98)}
.top-logo{font-family:'Abril Fatface',serif;font-size:1rem;text-decoration:none;transition:color 0.2s}
.mode-toggle{display:flex;gap:6px;align-items:center}
.mode-btn{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(255,255,255,0.08);background:transparent;cursor:pointer;border-radius:20px;transition:all 0.3s}
.mode-btn.biscuit{color:#ff6b9d}
.mode-btn.biscuit.active{border-color:#ff6b9d;background:rgba(255,107,157,0.1)}
.mode-btn.bread{color:#d4a574}
.mode-btn.bread.active{border-color:#d4a574;background:rgba(212,165,116,0.1)}

.tts-btn{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:4px 8px;border:1px solid rgba(255,255,255,0.08);background:transparent;cursor:pointer;border-radius:20px;color:rgba(255,255,255,0.3);transition:all 0.3s;margin-left:4px}
.tts-btn.on{color:#ff6b9d;border-color:rgba(255,107,157,0.4)}

.back-btn{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:4px 10px;border:1px solid rgba(255,255,255,0.08);background:transparent;cursor:pointer;border-radius:20px;color:rgba(255,255,255,0.3);transition:all 0.2s;margin-right:8px}
.back-btn:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2)}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}

.msg{max-width:85%;line-height:1.65;font-size:0.92rem;padding:12px 16px;border-radius:16px;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:rgba(255,255,255,0.05);color:#e8e0d0;border:1px solid rgba(255,255,255,0.06)}
.msg.ai{align-self:flex-start;border:1px solid rgba(255,255,255,0.06)}
.msg.ai.biscuit-msg{background:rgba(255,107,157,0.04)}
.msg.ai.bread-msg{background:rgba(212,165,116,0.04)}
.msg.system{align-self:center;font-size:0.75rem;color:rgba(255,255,255,0.25);font-style:italic;border:none;padding:8px;text-align:center}

.msg-speaker{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:5px;display:block}

.typing{align-self:flex-start;color:rgba(255,255,255,0.3);font-style:italic;font-size:0.85rem;padding:8px 16px}
.typing::after{content:'...';animation:dots 1.5s infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* SPEAKING INDICATOR */
.speaking{position:relative}
.speaking::before{content:'';position:absolute;left:-8px;top:50%;width:3px;height:50%;transform:translateY(-50%);border-radius:2px;animation:pulse-speak 0.8s ease-in-out infinite}
.biscuit-msg.speaking::before{background:#ff6b9d}
.bread-msg.speaking::before{background:#d4a574}
@keyframes pulse-speak{0%,100%{opacity:0.3;height:25%}50%{opacity:1;height:55%}}

/* INPUT */
.input-area{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:8px;flex-shrink:0;background:rgba(10,10,15,0.98);padding-bottom:calc(10px + env(safe-area-inset-bottom,0px))}
.input-area input{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#e8e0d0;font-family:'Lora',serif;font-size:16px;padding:10px 14px;outline:none;border-radius:20px;transition:border-color 0.2s}
.input-area input:focus{border-color:rgba(255,255,255,0.2)}
.input-area input::placeholder{color:rgba(255,255,255,0.2);font-style:italic}
.send-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;padding:10px 18px;cursor:pointer;border-radius:20px;transition:all 0.2s;white-space:nowrap}
.send-btn:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7)}
.send-btn:disabled{opacity:0.2;cursor:not-allowed}
.roast-btn{background:rgba(255,107,157,0.08);border:1px solid rgba(255,107,157,0.25);color:#ff6b9d;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;padding:10px 14px;cursor:pointer;border-radius:20px;transition:all 0.2s;white-space:nowrap;display:none}
.roast-btn:hover{background:rgba(255,107,157,0.15);border-color:rgba(255,107,157,0.5)}
.roast-btn:disabled{opacity:0.2;cursor:not-allowed}
.roast-btn.visible{display:block}

/* MIC */
.mic-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:1.1rem;padding:10px 14px;cursor:pointer;border-radius:50%;transition:all 0.2s;line-height:1;width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mic-btn:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7)}
.mic-btn.recording{background:rgba(196,60,42,0.2);border-color:rgba(196,60,42,0.6);color:#c43c2a;animation:mic-pulse 1.5s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,60,42,0.3)}50%{box-shadow:0 0 0 8px rgba(196,60,42,0)}}

/* MEMORY INDICATOR */
.memory-bar{padding:4px 16px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);display:none;align-items:center;gap:6px;flex-shrink:0}
.memory-bar.active{display:flex}
.memory-dot{width:6px;height:6px;border-radius:50%;background:#c49a38;opacity:0.6}
.memory-label{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase}

/* EMOTIONAL COLOR STRIP */
.color-strip{display:flex;gap:3px;margin-left:auto;align-items:center}
.color-swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,0.08);transition:all 0.3s;position:relative;cursor:default}
.color-swatch:hover{transform:scale(1.4);z-index:2;border-color:rgba(255,255,255,0.3)}
.color-swatch .swatch-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:0.5rem;color:rgba(255,255,255,0.5);white-space:nowrap;background:rgba(10,10,15,0.95);padding:3px 6px;border-radius:3px;border:1px solid rgba(255,255,255,0.1)}
.color-swatch:hover .swatch-tip{display:block}
.color-now{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);animation:color-breathe 4s ease-in-out infinite;margin-left:4px}
@keyframes color-breathe{0%,100%{opacity:0.7}50%{opacity:1}}

@media(max-width:600px){
  .splash-pick{gap:16px}
  .splash-orb{width:150px;height:150px}
  .orb-label{font-size:1.2rem}
  .msg{max-width:90%;font-size:0.88rem}
}
@media(max-width:380px){
  .splash-orb{width:130px;height:130px}
  .orb-label{font-size:1rem}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-title">the companion</div>
  <div class="splash-pick">
    <div class="splash-orb biscuit" onclick="enterApp('biscuit')">
      <span class="orb-label">Biscuit</span>
      <span class="orb-sub">sassy science</span>
    </div>
    <div class="splash-orb bread" onclick="enterApp('bread')">
      <span class="orb-label">Bread</span>
      <span class="orb-sub">gut truth</span>
    </div>
  </div>
  <div class="splash-hint">tap to begin</div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- APP -->
<div class="app" id="app">
  <div class="top">
    <div style="display:flex;align-items:center">
      <button class="back-btn" onclick="backToSplash()">&#8592;</button>
      <span class="top-logo" id="topLogo">Biscuit</span>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn biscuit active" id="btnBiscuit" onclick="switchMode('biscuit')">Biscuit</button>
      <button class="mode-btn bread" id="btnBread" onclick="switchMode('bread')">Bread</button>
      <button class="tts-btn on" id="ttsBtn" onclick="toggleTTS()">TTS</button>
    </div>
  </div>

  <div class="memory-bar" id="memoryBar">
    <div class="memory-dot"></div>
    <span class="memory-label" id="memoryLabel">remembering...</span>
    <div class="color-strip" id="colorStrip"></div>
    <div class="color-now" id="colorNow" title="right now"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <button class="roast-btn" id="roastBtn" onclick="roastDad()">ROAST HIM</button>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">&#127908;</button>
    <input type="text" id="userInput" placeholder="Say something..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
let currentMode = 'biscuit';
let sessionId = 'companion_' + Date.now().toString(36);
let ttsEnabled = true;
let wakeLock = null;
let idleTimer = null;
let recognition = null;
let isRecording = false;
const IDLE_MINUTES = 8;
const MAX_MEMORY_TURNS = 40;
const MAX_SESSIONS_RECALL = 3;
const modeNames = {biscuit: 'Biscuit', bread: 'Bread'};
const modeColors = {biscuit: '#ff6b9d', bread: '#d4a574'};

// ─── Memory System ─────────────────────────────────────────
function getMemoryKey() { return 'companion_memory_' + currentMode; }

function loadMemory() {
  try { return JSON.parse(localStorage.getItem(getMemoryKey()) || '{"sessions":[]}'); }
  catch(e) { return {sessions:[]}; }
}

function saveMemory(mem) {
  localStorage.setItem(getMemoryKey(), JSON.stringify(mem));
}

function saveCurrentSession(turns) {
  if (!turns || turns.length === 0) return;
  const mem = loadMemory();
  const color = emotionToColor(sessionEnergy);
  const mood = moodWord(sessionEnergy);
  const session = {
    id: sessionId,
    date: new Date().toISOString(),
    mode: currentMode,
    turns: turns.slice(-MAX_MEMORY_TURNS),
    color: color,
    mood: mood
  };
  // Don't duplicate
  const idx = mem.sessions.findIndex(s => s.id === sessionId);
  if (idx >= 0) mem.sessions[idx] = session;
  else mem.sessions.push(session);
  // Keep last 10 sessions
  if (mem.sessions.length > 10) mem.sessions = mem.sessions.slice(-10);
  saveMemory(mem);
}

function buildMemoryContext() {
  const mem = loadMemory();
  if (!mem.sessions || mem.sessions.length === 0) return null;
  const recent = mem.sessions.slice(-MAX_SESSIONS_RECALL);
  let ctx = '';
  recent.forEach(s => {
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const moodTag = s.mood ? ' [mood: ' + s.mood + ']' : '';
    const lines = s.turns.slice(-6).map(t => (t.role==='user'?'User':'Companion') + ': ' + t.text).join('\n');
    ctx += '[' + dateStr + moodTag + ']\n' + lines + '\n\n';
  });
  return ctx.trim();
}

function showMemoryIndicator() {
  const mem = loadMemory();
  const bar = document.getElementById('memoryBar');
  const label = document.getElementById('memoryLabel');
  if (mem.sessions.length > 0) {
    const count = mem.sessions.reduce((n,s) => n + s.turns.length, 0);
    label.textContent = count + ' memories · ' + mem.sessions.length + ' sessions';
    bar.classList.add('active');
    renderColorStrip();
    updateLiveColor();
  } else {
    bar.classList.remove('active');
  }
}

// Track current session turns for saving
let currentTurns = [];
let sessionEnergy = [];  // rolling energy readings for live color

// ─── Emotional Color Engine ────────────────────────────────
// Three axes → HSL color. Content compresses away, color stays.
// Energy (word count velocity, exclamations, caps) → Hue
// Compression (avg word length / sentence length ratio) → Saturation
// Rhythm (variance in message lengths) → Lightness

function measureTurn(text) {
  const words = text.split(/\s+/).filter(w => w.length > 0);
  const wc = words.length;
  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  const sc = Math.max(sentences.length, 1);
  const avgWordLen = words.reduce((s,w) => s + w.length, 0) / Math.max(wc,1);
  const wps = wc / sc;
  const excl = (text.match(/[!?]/g) || []).length;
  const caps = (text.match(/[A-Z]{2,}/g) || []).length;

  // Energy: 0-10. Word count + punctuation heat
  const energy = Math.min(10, (wc / 8) + excl * 0.5 + caps * 0.3);

  // Compression: 0-1. Short dense words = high compression
  const compression = Math.min(1, (avgWordLen / wps) * 0.5);

  // Rhythm: 0-1. How much message lengths vary (needs history)
  return { energy, compression, wps, wc };
}

function emotionToColor(readings) {
  if (!readings || readings.length === 0) return '#555555';

  const avgEnergy = readings.reduce((s,r) => s + r.energy, 0) / readings.length;
  const avgCompression = readings.reduce((s,r) => s + r.compression, 0) / readings.length;
  const lengths = readings.map(r => r.wc);
  const meanLen = lengths.reduce((s,l) => s+l, 0) / lengths.length;
  const variance = lengths.length > 1
    ? Math.sqrt(lengths.reduce((s,l) => s + (l-meanLen)**2, 0) / lengths.length)
    : 0;
  const rhythm = Math.min(1, variance / 20);

  // Map to HSL
  // Energy → Hue: low=blue(220), mid=amber(40), high=red(0)
  const hue = Math.round(220 - (avgEnergy / 10) * 220);
  // Compression → Saturation: 30-90%
  const sat = Math.round(30 + avgCompression * 60);
  // Rhythm → Lightness: steady=darker(35), chaotic=brighter(65)
  const lit = Math.round(35 + rhythm * 30);

  return 'hsl(' + hue + ',' + sat + '%,' + lit + '%)';
}

function moodWord(readings) {
  if (!readings || readings.length === 0) return 'quiet';
  const avgEnergy = readings.reduce((s,r) => s + r.energy, 0) / readings.length;
  const avgComp = readings.reduce((s,r) => s + r.compression, 0) / readings.length;
  if (avgEnergy > 7) return avgComp > 0.5 ? 'electric' : 'blazing';
  if (avgEnergy > 4) return avgComp > 0.5 ? 'focused' : 'warm';
  if (avgEnergy > 2) return avgComp > 0.5 ? 'steady' : 'gentle';
  return avgComp > 0.5 ? 'still' : 'quiet';
}

function updateLiveColor() {
  const color = emotionToColor(sessionEnergy);
  const now = document.getElementById('colorNow');
  if (now) now.style.background = color;
}

function renderColorStrip() {
  const mem = loadMemory();
  const strip = document.getElementById('colorStrip');
  if (!strip) return;
  strip.innerHTML = '';
  mem.sessions.forEach(s => {
    if (!s.color) return;
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = s.color;
    const tip = document.createElement('span');
    tip.className = 'swatch-tip';
    tip.textContent = dateStr + ' · ' + (s.mood || '');
    sw.appendChild(tip);
    strip.appendChild(sw);
  });
}

// ─── Voice Input (Web Speech API) ──────────────────────────
function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const input = document.getElementById('userInput');
    if (final) { input.value = final; stopMic(); sendMsg(); }
    else { input.value = interim; }
  };
  recognition.onerror = () => stopMic();
  recognition.onend = () => { if (isRecording) stopMic(); };
}

function toggleMic() {
  if (isRecording) stopMic();
  else startMic();
}

function startMic() {
  if (!recognition) initSpeechRecognition();
  if (!recognition) { addMsg('system','Voice not supported in this browser.'); return; }
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('userInput').placeholder = 'Listening...';
  recognition.start();
}

function stopMic() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('userInput').placeholder = 'Say something...';
  if (recognition) try { recognition.stop(); } catch(e) {}
}

initSpeechRecognition();

// ─── Particles ──────────────────────────────────────────────
function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = 60 + Math.random() * 40 + '%';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.animationDuration = 6 + Math.random() * 6 + 's';
    p.style.background = Math.random() > 0.5 ? '#ff6b9d' : '#d4a574';
    p.style.width = p.style.height = (2 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
}
spawnParticles();

// ─── Wake Lock ──────────────────────────────────────────────
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch(e) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ─── Splash → App transition ────────────────────────────────
function enterApp(mode) {
  currentMode = mode;
  sessionId = 'companion_' + Date.now().toString(36);
  ttsEnabled = mode === 'biscuit';
  updateTTSBtn();
  updateModeButtons();

  document.getElementById('topLogo').textContent = modeNames[mode];
  document.getElementById('topLogo').style.color = modeColors[mode];
  document.getElementById('chat').innerHTML = '';

  const splash = document.getElementById('splash');
  const app = document.getElementById('app');
  const particles = document.getElementById('particles');

  splash.classList.add('gone');
  setTimeout(() => {
    splash.style.display = 'none';
    particles.style.display = 'none';
    app.classList.add('active');
    document.getElementById('userInput').focus();
    updateRoastBtn();
    currentTurns = [];
    sessionEnergy = [];
    showMemoryIndicator();

    // First message from the Companion
    const openers = {
      biscuit: [
        "Oh good, you're here. Your dad just tried to fix something and made it worse. Again. Ask me what happened.",
        "Hey. So your dad's been talking to me all day like I'm his therapist. I'm not. I'm yours. Let's roast him.",
        "Your dad told me to be educational. Then he burned his noodles. Ask me anything.",
        "I just watched your dad unplug the TV trying to find the Wi-Fi cable. He has a college degree.",
        "Your dad's dog ate the power button off the remote and honestly that tracks. The whole house is chaos. What's up?",
      ],
      bread: [
        "Your gut bacteria have been waiting for this conversation.",
        "Let's talk about what's actually happening inside you.",
        "The last thing you ate is still being processed by about forty trillion organisms. Want to know what they think?",
      ]
    };
    const lines = openers[mode];
    const opener = lines[Math.floor(Math.random() * lines.length)];
    addMsg('ai', opener, modeNames[mode]);
    speak(opener);
    resetIdleTimer();
  }, 600);
}

function backToSplash() {
  const splash = document.getElementById('splash');
  const app = document.getElementById('app');
  const particles = document.getElementById('particles');
  app.classList.remove('active');
  splash.style.display = 'flex';
  particles.style.display = 'block';
  setTimeout(() => splash.classList.remove('gone'), 50);
  speechSynthesis.cancel();
  clearTimeout(idleTimer);
}

// ─── Mode switching (inside app) ────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  sessionId = 'companion_' + Date.now().toString(36);
  ttsEnabled = mode === 'biscuit';
  updateTTSBtn();
  updateModeButtons();
  document.getElementById('topLogo').textContent = modeNames[mode];
  document.getElementById('topLogo').style.color = modeColors[mode];
  addMsg('system', 'Switched to ' + modeNames[mode] + '.');
  updateRoastBtn();
  currentTurns = [];
  sessionEnergy = [];
  showMemoryIndicator();
  resetIdleTimer();
}

function updateModeButtons() {
  document.getElementById('btnBiscuit').classList.toggle('active', currentMode === 'biscuit');
  document.getElementById('btnBread').classList.toggle('active', currentMode === 'bread');
}

// ─── TTS ────────────────────────────────────────────────────
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  if (!ttsEnabled) speechSynthesis.cancel();
  updateTTSBtn();
}

function updateTTSBtn() {
  const btn = document.getElementById('ttsBtn');
  btn.classList.toggle('on', ttsEnabled);
  btn.textContent = ttsEnabled ? 'TTS' : 'MUTE';
}

function speak(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.05;
  u.pitch = currentMode === 'biscuit' ? 1.15 : 0.95;
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Natural'));
  if (preferred) u.voice = preferred;
  const lastAi = document.querySelector('.msg.ai:last-of-type');
  if (lastAi) lastAi.classList.add('speaking');
  u.onend = () => { if (lastAi) lastAi.classList.remove('speaking'); };
  u.onerror = () => { if (lastAi) lastAi.classList.remove('speaking'); };
  speechSynthesis.speak(u);
}

if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ─── Idle auto-greet ────────────────────────────────────────
const idleGreets = {

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(autoGreet, IDLE_MINUTES * 60 * 1000);
}

function autoGreet() {
  const greets = idleGreets[currentMode];
  const greet = greets[Math.floor(Math.random() * greets.length)];
  addMsg('ai', greet, modeNames[currentMode]);
  speak(greet);
  resetIdleTimer();
}

// ─── Messages ───────────────────────────────────────────────
function addMsg(role, text, speaker) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'ai') div.classList.add(currentMode + '-msg');
  if (speaker) {
    const sp = document.createElement('span');
    sp.className = 'msg-speaker';
    sp.style.color = modeColors[currentMode] || 'rgba(255,255,255,0.3)';
    sp.textContent = speaker;
    div.appendChild(sp);
  }
  const t = document.createElement('span');
  if (role === 'system') { t.innerHTML = text; } else { t.textContent = text; }
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

  "tell me something embarrassing about my dad",
  "what did my dad try to fix and break instead",
  "rate my dad's cooking on a scale of 1 to dumpster fire",

];
let lastRoastIdx = -1;

function roastDad() {
  let idx;
  do { idx = Math.floor(Math.random() * roastPrompts.length); } while (idx === lastRoastIdx);
  lastRoastIdx = idx;
  document.getElementById('userInput').value = roastPrompts[idx];
  sendMsg();
}

function updateRoastBtn() {
  const btn = document.getElementById('roastBtn');
  if (currentMode === 'biscuit') btn.classList.add('visible');
  else btn.classList.remove('visible');
}

// ─── Send ───────────────────────────────────────────────────
async function sendMsg() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  resetIdleTimer();
  input.value = '';
  addMsg('user', text);
  currentTurns.push({role:'user', text: text});
  // Emotional measurement
  const reading = measureTurn(text);
  sessionEnergy.push(reading);
  updateLiveColor();
  saveCurrentSession(currentTurns);

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = modeNames[currentMode] + ' is thinking';
  document.getElementById('chat').appendChild(typing);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

  document.getElementById('sendBtn').disabled = true;

  // Build memory context from past sessions
  const memCtx = buildMemoryContext();
  const payload = {
    identityId: 'companion-' + currentMode,
    message: text,
    sessionId: sessionId
  };
  if (memCtx) payload.memoryContext = memCtx;

  try {
    const res = await fetch('https://mcp.heuremen.org/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    typing.remove();

    if (data.response) {
      addMsg('ai', data.response, modeNames[currentMode]);
      currentTurns.push({role:'ai', text: data.response});
      saveCurrentSession(currentTurns);
      speak(data.response);
    } else {
      addMsg('system', 'Quiet. Try again.');
    }
  } catch(e) {
    typing.remove();
    addMsg('system', 'Connection lost. Try again.');
  }

  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
