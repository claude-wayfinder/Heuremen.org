<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Companion</title>
<meta name="description" content="A thinking partner that talks back. Two modes: Biscuit (sassy science) and Bread (gut truth).">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Abril+Fatface&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="heuremen.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c8a84e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--h-bg-dark);color:var(--h-text-primary);font-family:var(--h-font-serif);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* TOP BAR */
.top{padding:12px 20px;border-bottom:1px solid var(--h-border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:rgba(var(--h-dark-rgb),0.95)}
.top-logo{font-family:var(--h-font-display);font-size:1.1rem;color:var(--h-gold);text-decoration:none}
.mode-toggle{display:flex;gap:6px;align-items:center}
.mode-btn{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--h-border);background:transparent;cursor:pointer;border-radius:3px;transition:all 0.2s}
.mode-btn.biscuit{color:#ff6b9d}
.mode-btn.biscuit.active,.mode-btn.biscuit:hover{border-color:#ff6b9d;background:rgba(255,107,157,0.06)}
.mode-btn.bread{color:#d4a574}
.mode-btn.bread.active,.mode-btn.bread:hover{border-color:#d4a574;background:rgba(212,165,116,0.06)}

.tts-btn{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;padding:4px 8px;border:1px solid var(--h-border);background:transparent;cursor:pointer;border-radius:3px;color:var(--h-text-tertiary);transition:all 0.2s;margin-left:6px}
.tts-btn.on{color:#ff6b9d;border-color:#ff6b9d}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}

.msg{max-width:85%;line-height:1.6;font-size:0.95rem;padding:12px 16px;border-radius:8px}
.msg.user{align-self:flex-end;background:rgba(var(--h-gold-rgb),0.08);color:var(--h-text-primary);border:1px solid var(--h-border)}
.msg.ai{align-self:flex-start;border:1px solid var(--h-border)}
.msg.system{align-self:center;font-size:0.8rem;color:var(--h-text-tertiary);font-style:italic;border:none;padding:8px;text-align:center}

.msg-speaker{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:6px;display:block}

.typing{align-self:flex-start;color:var(--h-gold-dim);font-style:italic;font-size:0.9rem;padding:8px 16px}
.typing::after{content:'...';animation:dots 1.5s infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* SPEAKING INDICATOR */
.speaking{position:relative}
.speaking::before{content:'';position:absolute;left:-8px;top:50%;width:4px;height:60%;transform:translateY(-50%);background:#ff6b9d;border-radius:2px;animation:pulse-speak 0.8s ease-in-out infinite}
@keyframes pulse-speak{0%,100%{opacity:0.3;height:30%}50%{opacity:1;height:60%}}

/* INPUT */
.input-area{padding:12px 20px;border-top:1px solid var(--h-border);display:flex;gap:8px;flex-shrink:0;background:rgba(var(--h-dark-rgb),0.95);padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))}
.input-area input{flex:1;background:transparent;border:1px solid var(--h-border);color:var(--h-text-primary);font-family:var(--h-font-serif);font-size:16px;padding:10px 14px;outline:none;border-radius:4px}
.input-area input:focus{border-color:var(--h-gold-dim)}
.input-area input::placeholder{color:var(--h-text-tertiary);font-style:italic}
.send-btn{background:transparent;border:1px solid var(--h-gold-dim);color:var(--h-gold);font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:10px 20px;cursor:pointer;border-radius:4px;transition:all 0.2s;white-space:nowrap}
.send-btn:hover{background:rgba(var(--h-gold-rgb),0.06);border-color:var(--h-gold)}
.send-btn:disabled{opacity:0.3;cursor:not-allowed}

@media(max-width:600px){.msg{max-width:92%;font-size:0.9rem}.top{flex-wrap:wrap;gap:8px}}
</style>
</head>
<body>

<div class="top">
  <a href="/" class="top-logo">The Companion</a>
  <div class="mode-toggle">
    <button class="mode-btn biscuit active" onclick="pickMode('biscuit',this)">Biscuit</button>
    <button class="mode-btn bread" onclick="pickMode('bread',this)">Bread</button>
    <button class="tts-btn on" id="ttsBtn" onclick="toggleTTS()">TTS</button>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msg system">Biscuit mode: sassy science that roasts you while you learn.<br>Bread mode: your gut already knows. Let's talk about why.</div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Say something..." onkeydown="if(event.key==='Enter')sendMsg()">
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
</div>

<script>
let currentMode = 'biscuit';
let sessionId = 'companion_' + Date.now().toString(36);
let ttsEnabled = true;
let wakeLock = null;
let idleTimer = null;
const IDLE_MINUTES = 8;
const modeNames = {biscuit: 'Biscuit', bread: 'Bread'};
const modeColors = {biscuit: '#ff6b9d', bread: '#d4a574'};

// ─── Wake Lock: keep screen alive ───────────────────────────────────────
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch(e) { /* silent — not all browsers support it */ }
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ─── Idle auto-greet: Companion speaks first if nobody's talking ─────
const idleGreets = {
  biscuit: [
    "You're just gonna stand there or are we doing this?",
    "I can hear you breathing. Say something.",
    "Your dad would've said something by now. Just saying.",
    "Fun fact: octopuses have three hearts and zero patience. Same.",
    "I've been sitting here thinking about whether a hot dog is a sandwich. Thoughts?",
    "Did you know your gut bacteria outnumber your human cells? You're basically a bacterial colony with a phone.",
    "If you're bored, ask me about the weirdest animal alive. I dare you.",
  ],
  bread: [
    "Your starter is probably hungry right now.",
    "The bacteria in your gut made a decision about your mood before you woke up this morning.",
    "Still here. Still fermenting.",
    "Fun fact: the tryptophan in your gut right now is deciding whether you get serotonin or inflammation. No pressure.",
  ]
};

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(autoGreet, IDLE_MINUTES * 60 * 1000);
}

async function autoGreet() {
  const greets = idleGreets[currentMode];
  const greet = greets[Math.floor(Math.random() * greets.length)];
  addMsg('ai', greet, modeNames[currentMode]);
  speak(greet);
  resetIdleTimer();
}

resetIdleTimer();

function pickMode(mode, btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = mode;
  sessionId = 'companion_' + Date.now().toString(36);
  addMsg('system', 'Switched to ' + modeNames[mode] + '.');
  // Auto-enable TTS in Biscuit, disable in Bread
  ttsEnabled = mode === 'biscuit';
  updateTTSBtn();
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  if (!ttsEnabled) speechSynthesis.cancel();
  updateTTSBtn();
}

function updateTTSBtn() {
  const btn = document.getElementById('ttsBtn');
  btn.classList.toggle('on', ttsEnabled);
  btn.textContent = ttsEnabled ? 'TTS' : 'MUTE';
}

function speak(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.05;
  u.pitch = currentMode === 'biscuit' ? 1.15 : 0.95;
  // Try to pick a natural voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Natural'));
  if (preferred) u.voice = preferred;
  // Add speaking indicator
  const lastAi = document.querySelector('.msg.ai:last-of-type');
  if (lastAi) lastAi.classList.add('speaking');
  u.onend = () => { if (lastAi) lastAi.classList.remove('speaking'); };
  u.onerror = () => { if (lastAi) lastAi.classList.remove('speaking'); };
  speechSynthesis.speak(u);
}

// Preload voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function addMsg(role, text, speaker) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (speaker) {
    const sp = document.createElement('span');
    sp.className = 'msg-speaker';
    sp.style.color = modeColors[currentMode] || 'var(--h-gold-dim)';
    sp.textContent = speaker;
    div.appendChild(sp);
  }
  const t = document.createElement('span');
  if (role === 'system') { t.innerHTML = text; } else { t.textContent = text; }
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMsg() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  resetIdleTimer();
  input.value = '';
  addMsg('user', text);

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = modeNames[currentMode] + ' is thinking';
  document.getElementById('chat').appendChild(typing);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch('https://heuremen-mcp.kory-indahl.workers.dev/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        identityId: 'companion-' + currentMode,
        message: text,
        sessionId: sessionId
      })
    });
    const data = await res.json();
    typing.remove();

    if (data.response) {
      addMsg('ai', data.response, modeNames[currentMode]);
      speak(data.response);
    } else {
      addMsg('system', 'Quiet. Try again.');
    }
  } catch(e) {
    typing.remove();
    addMsg('system', 'Connection lost. Try refreshing.');
  }

  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>

</body>
</html>
