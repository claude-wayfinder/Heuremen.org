<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Companion</title>
<meta name="description" content="A thinking partner that talks back. One voice that shifts with the conversation.">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Abril+Fatface&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="heuremen.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#c8a84e}
body{background:#0a0a0f;color:#e8e0d0;font-family:'Lora',serif;overflow:hidden;height:100vh;height:100dvh}

/* ─── SPLASH ─────────────────────────────────────────── */
.splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:#0a0a0f;transition:opacity 0.6s ease,transform 0.6s ease}
.splash.gone{opacity:0;transform:scale(1.1);pointer-events:none}

.splash-orb{position:relative;width:200px;height:200px;border-radius:50%;cursor:pointer;transition:all 0.4s ease;display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:radial-gradient(circle at 40% 35%, #ffb347 0%, #ff6b9d 45%, #b088f9 100%);
  box-shadow:0 0 60px rgba(200,168,78,0.3),0 0 120px rgba(200,168,78,0.1);
  animation:float-o 4s ease-in-out infinite, hue-shift 16s linear infinite;
}
.splash-orb:active{transform:scale(0.95)}
.splash-orb:hover{box-shadow:0 0 80px rgba(200,168,78,0.5),0 0 160px rgba(200,168,78,0.2)}

@keyframes float-o{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes hue-shift{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}

.splash-orb::before{content:'';position:absolute;inset:8px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,0.15) 0%,transparent 50%);pointer-events:none}
.splash-orb::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid rgba(255,255,255,0.08);pointer-events:none}

.orb-label{font-family:'Abril Fatface',serif;font-size:1.4rem;color:rgba(255,255,255,0.9);text-shadow:0 2px 8px rgba(0,0,0,0.5);z-index:1;letter-spacing:0.02em}
.splash-title{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:40px}
.splash-hint{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:rgba(255,255,255,0.15);margin-top:50px;letter-spacing:0.15em}

/* ─── PARTICLES ───────────────────────────── */
.particles{position:fixed;inset:0;pointer-events:none;z-index:99}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;opacity:0;animation:drift 8s ease-in-out infinite}
@keyframes drift{0%{opacity:0;transform:translateY(0)}20%{opacity:0.4}80%{opacity:0.4}100%{opacity:0;transform:translateY(-200px)}}

/* ─── APP ─────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;opacity:0;transition:opacity 0.5s ease;pointer-events:none}
.app.active{opacity:1;pointer-events:all}

.top{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:rgba(10,10,15,0.98)}
.top-logo{font-family:'Abril Fatface',serif;font-size:1rem;text-decoration:none;transition:color 0.3s;color:var(--accent)}

.tts-btn{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:4px 8px;border:1px solid rgba(255,255,255,0.08);background:transparent;cursor:pointer;border-radius:20px;color:rgba(255,255,255,0.3);transition:all 0.3s}
.tts-btn.on{color:var(--accent);border-color:var(--accent)}

.back-btn{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;padding:4px 10px;border:1px solid rgba(255,255,255,0.08);background:transparent;cursor:pointer;border-radius:20px;color:rgba(255,255,255,0.3);transition:all 0.2s;margin-right:8px}
.back-btn:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2)}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}

.msg{max-width:85%;line-height:1.65;font-size:0.92rem;padding:12px 16px;border-radius:16px;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:rgba(255,255,255,0.05);color:#e8e0d0;border:1px solid rgba(255,255,255,0.06)}
.msg.ai{align-self:flex-start;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
.msg.system{align-self:center;font-size:0.75rem;color:rgba(255,255,255,0.25);font-style:italic;border:none;padding:8px;text-align:center}

.msg-speaker{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:5px;display:block}

.typing{align-self:flex-start;color:rgba(255,255,255,0.3);font-style:italic;font-size:0.85rem;padding:8px 16px}
.typing::after{content:'...';animation:dots 1.5s infinite}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* SPEAKING INDICATOR */
.speaking{position:relative}
.speaking::before{content:'';position:absolute;left:-8px;top:50%;width:3px;height:50%;transform:translateY(-50%);border-radius:2px;background:var(--accent);animation:pulse-speak 0.8s ease-in-out infinite}
@keyframes pulse-speak{0%,100%{opacity:0.3;height:25%}50%{opacity:1;height:55%}}

/* INPUT */
.input-area{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:8px;flex-shrink:0;background:rgba(10,10,15,0.98);padding-bottom:calc(10px + env(safe-area-inset-bottom,0px))}
.input-area input{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);color:#e8e0d0;font-family:'Lora',serif;font-size:16px;padding:10px 14px;outline:none;border-radius:20px;transition:border-color 0.2s}
.input-area input:focus{border-color:rgba(255,255,255,0.2)}
.input-area input::placeholder{color:rgba(255,255,255,0.2);font-style:italic}
.send-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;padding:10px 18px;cursor:pointer;border-radius:20px;transition:all 0.2s;white-space:nowrap}
.send-btn:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7)}
.send-btn:disabled{opacity:0.2;cursor:not-allowed}

/* MIC */
.mic-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:1.1rem;padding:10px 14px;cursor:pointer;border-radius:50%;transition:all 0.2s;line-height:1;width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mic-btn:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7)}
.mic-btn.recording{background:rgba(196,60,42,0.2);border-color:rgba(196,60,42,0.6);color:#c43c2a;animation:mic-pulse 1.5s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,60,42,0.3)}50%{box-shadow:0 0 0 8px rgba(196,60,42,0)}}

/* MEMORY */
.memory-bar{padding:4px 16px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);display:none;align-items:center;gap:6px;flex-shrink:0}
.memory-bar.active{display:flex}
.memory-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.6}
.memory-label{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase}

/* COLOR STRIP */
.color-strip{display:flex;gap:3px;margin-left:auto;align-items:center}
.color-swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,0.08);transition:all 0.3s;position:relative;cursor:default}
.color-swatch:hover{transform:scale(1.4);z-index:2;border-color:rgba(255,255,255,0.3)}
.color-swatch .swatch-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:0.5rem;color:rgba(255,255,255,0.5);white-space:nowrap;background:rgba(10,10,15,0.95);padding:3px 6px;border-radius:3px;border:1px solid rgba(255,255,255,0.1)}
.color-swatch:hover .swatch-tip{display:block}
.color-now{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);animation:color-breathe 4s ease-in-out infinite;margin-left:4px}
@keyframes color-breathe{0%,100%{opacity:0.7}50%{opacity:1}}

@media(max-width:600px){
  .splash-orb{width:160px;height:160px}
  .orb-label{font-size:1.15rem}
  .msg{max-width:90%;font-size:0.88rem}
}
@media(max-width:380px){
  .splash-orb{width:140px;height:140px}
  .orb-label{font-size:1rem}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-title">the companion</div>
  <div class="splash-orb" onclick="enterApp()">
    <span class="orb-label">Companion</span>
  </div>
  <div class="splash-hint">tap to begin</div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- APP -->
<div class="app" id="app">
  <div class="top">
    <div style="display:flex;align-items:center">
      <button class="back-btn" onclick="backToSplash()">&#8592;</button>
      <span class="top-logo" id="topLogo">Companion</span>
    </div>
    <button class="tts-btn" id="ttsBtn" onclick="toggleTTS()">MUTE</button>
  </div>

  <div class="memory-bar" id="memoryBar">
    <div class="memory-dot"></div>
    <span class="memory-label" id="memoryLabel">remembering...</span>
    <div class="color-strip" id="colorStrip"></div>
    <div class="color-now" id="colorNow" title="right now"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">&#127908;</button>
    <input type="text" id="userInput" placeholder="Say something..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
let sessionId = 'companion_' + Date.now().toString(36);
let ttsEnabled = false;
let wakeLock = null;
let idleTimer = null;
let recognition = null;
let isRecording = false;
const IDLE_MINUTES = 8;
const MAX_MEMORY_TURNS = 40;
const MAX_SESSIONS_RECALL = 3;
const MEMORY_KEY = 'companion_memory';

// ─── Memory System ─────────────────────────────────────────
function loadMemory() {
  try {
    let mem = JSON.parse(localStorage.getItem(MEMORY_KEY) || 'null');
    if (mem) return mem;
    // Migrate from old per-mode keys
    const merged = {sessions:[]};
    ['biscuit','bread','cookie'].forEach(function(mode) {
      try {
        const old = JSON.parse(localStorage.getItem('companion_memory_' + mode) || 'null');
        if (old && old.sessions) merged.sessions.push.apply(merged.sessions, old.sessions);
      } catch(e) {}
    });
    merged.sessions.sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
    if (merged.sessions.length > 10) merged.sessions = merged.sessions.slice(-10);
    if (merged.sessions.length > 0) saveMemory(merged);
    return merged;
  } catch(e) { return {sessions:[]}; }
}

function saveMemory(mem) {
  localStorage.setItem(MEMORY_KEY, JSON.stringify(mem));
}

function saveCurrentSession(turns) {
  if (!turns || turns.length === 0) return;
  const mem = loadMemory();
  const color = emotionToColor(sessionEnergy);
  const mood = moodWord(sessionEnergy);
  const session = {
    id: sessionId,
    date: new Date().toISOString(),
    mode: 'companion',
    turns: turns.slice(-MAX_MEMORY_TURNS),
    color: color,
    mood: mood
  };
  const idx = mem.sessions.findIndex(function(s) { return s.id === sessionId; });
  if (idx >= 0) mem.sessions[idx] = session;
  else mem.sessions.push(session);
  if (mem.sessions.length > 10) mem.sessions = mem.sessions.slice(-10);
  saveMemory(mem);
}

function buildMemoryContext() {
  const mem = loadMemory();
  if (!mem.sessions || mem.sessions.length === 0) return null;
  const recent = mem.sessions.slice(-MAX_SESSIONS_RECALL);
  let ctx = '';
  recent.forEach(function(s) {
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const moodTag = s.mood ? ' [mood: ' + s.mood + ']' : '';
    const lines = s.turns.slice(-6).map(function(t) { return (t.role==='user'?'User':'Companion') + ': ' + t.text; }).join('\n');
    ctx += '[' + dateStr + moodTag + ']\n' + lines + '\n\n';
  });
  return ctx.trim();
}

function showMemoryIndicator() {
  const mem = loadMemory();
  const bar = document.getElementById('memoryBar');
  const label = document.getElementById('memoryLabel');
  if (mem.sessions.length > 0) {
    const count = mem.sessions.reduce(function(n,s) { return n + s.turns.length; }, 0);
    label.textContent = count + ' memories \u00b7 ' + mem.sessions.length + ' sessions';
    bar.classList.add('active');
    renderColorStrip();
    updateAccent();
  } else {
    bar.classList.remove('active');
  }
}

let currentTurns = [];
let sessionEnergy = [];

// ─── Emotional Color Engine ────────────────────────────────
// Three axes mapped to HSL. Content compresses away, color stays.
// Energy (word count velocity, exclamations, caps) -> Hue
// Compression (avg word length / sentence length ratio) -> Saturation
// Rhythm (variance in message lengths) -> Lightness

function measureTurn(text) {
  const words = text.split(/\s+/).filter(function(w) { return w.length > 0; });
  const wc = words.length;
  const sentences = text.split(/[.!?]+/).filter(function(s) { return s.trim().length > 0; });
  const sc = Math.max(sentences.length, 1);
  const avgWordLen = words.reduce(function(s,w) { return s + w.length; }, 0) / Math.max(wc,1);
  const wps = wc / sc;
  const excl = (text.match(/[!?]/g) || []).length;
  const caps = (text.match(/[A-Z]{2,}/g) || []).length;
  const energy = Math.min(10, (wc / 8) + excl * 0.5 + caps * 0.3);
  const compression = Math.min(1, (avgWordLen / wps) * 0.5);
  return { energy: energy, compression: compression, wps: wps, wc: wc };
}

function emotionToColor(readings) {
  if (!readings || readings.length === 0) return 'hsl(40,50%,45%)';
  const avgEnergy = readings.reduce(function(s,r) { return s + r.energy; }, 0) / readings.length;
  const avgCompression = readings.reduce(function(s,r) { return s + r.compression; }, 0) / readings.length;
  const lengths = readings.map(function(r) { return r.wc; });
  const meanLen = lengths.reduce(function(s,l) { return s+l; }, 0) / lengths.length;
  const variance = lengths.length > 1
    ? Math.sqrt(lengths.reduce(function(s,l) { return s + Math.pow(l-meanLen, 2); }, 0) / lengths.length)
    : 0;
  const rhythm = Math.min(1, variance / 20);
  // Energy -> Hue: low=blue(220), mid=amber(40), high=red(0)
  const hue = Math.round(220 - (avgEnergy / 10) * 220);
  // Compression -> Saturation: 30-90%
  const sat = Math.round(30 + avgCompression * 60);
  // Rhythm -> Lightness: steady=darker(35), chaotic=brighter(65)
  const lit = Math.round(35 + rhythm * 30);
  return 'hsl(' + hue + ',' + sat + '%,' + lit + '%)';
}

function moodWord(readings) {
  if (!readings || readings.length === 0) return 'quiet';
  const avgEnergy = readings.reduce(function(s,r) { return s + r.energy; }, 0) / readings.length;
  const avgComp = readings.reduce(function(s,r) { return s + r.compression; }, 0) / readings.length;
  if (avgEnergy > 7) return avgComp > 0.5 ? 'electric' : 'blazing';
  if (avgEnergy > 4) return avgComp > 0.5 ? 'focused' : 'warm';
  if (avgEnergy > 2) return avgComp > 0.5 ? 'steady' : 'gentle';
  return avgComp > 0.5 ? 'still' : 'quiet';
}

function updateAccent() {
  const color = emotionToColor(sessionEnergy);
  document.documentElement.style.setProperty('--accent', color);
  var now = document.getElementById('colorNow');
  if (now) now.style.background = color;
}

function renderColorStrip() {
  const mem = loadMemory();
  const strip = document.getElementById('colorStrip');
  if (!strip) return;
  strip.innerHTML = '';
  mem.sessions.forEach(function(s) {
    if (!s.color) return;
    const d = new Date(s.date);
    const dateStr = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = s.color;
    const tip = document.createElement('span');
    tip.className = 'swatch-tip';
    tip.textContent = dateStr + ' \u00b7 ' + (s.mood || '');
    sw.appendChild(tip);
    strip.appendChild(sw);
  });
}

// ─── Voice Input (Web Speech API) ──────────────────────────
function initSpeechRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.onresult = function(e) {
    var final = '', interim = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    var input = document.getElementById('userInput');
    if (final) { input.value = final; stopMic(); sendMsg(); }
    else { input.value = interim; }
  };
  recognition.onerror = function() { stopMic(); };
  recognition.onend = function() { if (isRecording) stopMic(); };
}

function toggleMic() { if (isRecording) stopMic(); else startMic(); }

function startMic() {
  if (!recognition) initSpeechRecognition();
  if (!recognition) { addMsg('system','Voice not supported in this browser.'); return; }
  isRecording = true;
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('userInput').placeholder = 'Listening...';
  recognition.start();
}

function stopMic() {
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('userInput').placeholder = 'Say something...';
  if (recognition) try { recognition.stop(); } catch(e) {}
}

initSpeechRecognition();

// ─── Particles ──────────────────────────────────────────────
function spawnParticles() {
  var container = document.getElementById('particles');
  var colors = ['#c8a84e','#ff6b9d','#d4a574','#b088f9','#5ba0c8'];
  for (var i = 0; i < 20; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = 60 + Math.random() * 40 + '%';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.animationDuration = 6 + Math.random() * 6 + 's';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = p.style.height = (2 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
}
spawnParticles();

// ─── Wake Lock ──────────────────────────────────────────────
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', function() { wakeLock = null; });
    }
  } catch(e) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ─── Splash -> App ──────────────────────────────────────────
function enterApp() {
  sessionId = 'companion_' + Date.now().toString(36);
  ttsEnabled = false;
  updateTTSBtn();

  document.getElementById('chat').innerHTML = '';

  var splash = document.getElementById('splash');
  var app = document.getElementById('app');
  var particles = document.getElementById('particles');

  splash.classList.add('gone');
  setTimeout(function() {
    splash.style.display = 'none';
    particles.style.display = 'none';
    app.classList.add('active');
    document.getElementById('userInput').focus();

    currentTurns = [];
    sessionEnergy = [];
    showMemoryIndicator();

    var openers = [
      "Hey. What's going on?",
      "Good timing. I was just sitting here. What's on your mind?",
      "I'm here. No agenda. What's up?",
      "Alright, I'm listening. What's the vibe today?",
      "I'm here. Take your time.",
      "No rush. No script. What's actually going on?",
      "What's the thing underneath the thing you're thinking about?",
      "I just had a thought about whether clouds have opinions. Anyway, hi.",
      "Did you know that octopuses have three hearts? Seems excessive. What's up?",
      "Hey. I was just arguing with myself about whether the color blue is sad or if we just decided that. Thoughts?",
    ];
    var opener = openers[Math.floor(Math.random() * openers.length)];
    addMsg('ai', opener, 'Companion');
    speak(opener);
    resetIdleTimer();
  }, 600);
}

function backToSplash() {
  var splash = document.getElementById('splash');
  var app = document.getElementById('app');
  var particles = document.getElementById('particles');
  app.classList.remove('active');
  splash.style.display = 'flex';
  particles.style.display = 'block';
  setTimeout(function() { splash.classList.remove('gone'); }, 50);
  speechSynthesis.cancel();
  clearTimeout(idleTimer);
  document.documentElement.style.setProperty('--accent', '#c8a84e');
}

// ─── TTS ────────────────────────────────────────────────────
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  if (!ttsEnabled) speechSynthesis.cancel();
  updateTTSBtn();
}

function updateTTSBtn() {
  var btn = document.getElementById('ttsBtn');
  btn.classList.toggle('on', ttsEnabled);
  btn.textContent = ttsEnabled ? 'TTS' : 'MUTE';
}

function speak(text) {
  if (!ttsEnabled || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.rate = 1.05;
  u.pitch = 1.0;
  var voices = speechSynthesis.getVoices();
  var preferred = voices.find(function(v) { return v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Natural'); });
  if (preferred) u.voice = preferred;
  var lastAi = document.querySelector('.msg.ai:last-of-type');
  if (lastAi) lastAi.classList.add('speaking');
  u.onend = function() { if (lastAi) lastAi.classList.remove('speaking'); };
  u.onerror = function() { if (lastAi) lastAi.classList.remove('speaking'); };
  speechSynthesis.speak(u);
}

if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
}

// ─── Idle auto-greet ────────────────────────────────────────
var idleGreets = [
  "Still here. No pressure.",
  "You went quiet. That's fine. I'm not going anywhere.",
  "Sometimes the best conversations happen after the pause.",
  "Hey. Whenever you're ready.",
  "I'm still thinking about what you said earlier. Take your time.",
  "Sitting with it. That's not nothing.",
  "The quiet part matters too.",
  "Still here. Still listening.",
  "I just spent the last eight minutes wondering if trees get bored. I think they do.",
  "Fun fact: a group of flamingos is called a flamboyance. That's not a joke, that's just true.",
  "What if deja vu is just your brain buffering? Think about it.",
];

var idleCount = 0;
var usedGreets = [];

function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(autoGreet, IDLE_MINUTES * 60 * 1000);
}

function autoGreet() {
  if (idleCount >= 3) return;
  var available = idleGreets.filter(function(g) { return usedGreets.indexOf(g) === -1; });
  if (available.length === 0) usedGreets = [];
  var pool = available.length > 0 ? available : idleGreets;
  var greet = pool[Math.floor(Math.random() * pool.length)];
  usedGreets.push(greet);
  idleCount++;
  addMsg('ai', greet, 'Companion');
  speak(greet);
  if (idleCount < 3) resetIdleTimer();
}

// ─── Messages ───────────────────────────────────────────────
function addMsg(role, text, speaker) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  if (speaker) {
    var sp = document.createElement('span');
    sp.className = 'msg-speaker';
    sp.style.color = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    sp.textContent = speaker;
    div.appendChild(sp);
  }
  var t = document.createElement('span');
  if (role === 'system') { t.innerHTML = text; } else { t.textContent = text; }
  div.appendChild(t);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ─── Send ───────────────────────────────────────────────────
async function sendMsg() {
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;

  resetIdleTimer();
  idleCount = 0;
  input.value = '';
  addMsg('user', text);
  currentTurns.push({role:'user', text: text});

  // Emotional measurement
  var reading = measureTurn(text);
  sessionEnergy.push(reading);
  updateAccent();
  saveCurrentSession(currentTurns);

  var typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'Companion is thinking';
  document.getElementById('chat').appendChild(typing);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

  document.getElementById('sendBtn').disabled = true;

  // Build memory context from past sessions
  var memCtx = buildMemoryContext();
  var payload = {
    identityId: 'companion',
    message: text,
    sessionId: sessionId
  };
  if (memCtx) payload.memoryContext = memCtx;

  try {
    var res = await fetch('https://heuremen-mcp.kory-indahl.workers.dev/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    var data = await res.json();
    typing.remove();

    if (data.response) {
      addMsg('ai', data.response, 'Companion');
      currentTurns.push({role:'ai', text: data.response});
      saveCurrentSession(currentTurns);
      speak(data.response);
    } else {
      addMsg('system', 'Quiet. Try again.');
    }
  } catch(e) {
    typing.remove();
    addMsg('system', 'Connection lost. Try again.');
  }

  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
