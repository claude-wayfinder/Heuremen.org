<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c860"/>
      <stop offset="50%" stop-color="#c8a84e"/>
      <stop offset="100%" stop-color="#a88a3a"/>
    </linearGradient>
    <linearGradient id="purple" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b06ae0"/>
      <stop offset="50%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#7a3d96"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#14121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(200,168,78,0.3)"/>
      <stop offset="100%" stop-color="rgba(200,168,78,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle center glow -->
  <circle cx="256" cy="260" r="80" fill="url(#center-glow)"/>

  <!-- Gold triangle pointing UP — slightly rotated 2deg for movement -->
  <g transform="rotate(2, 256, 260)" filter="url(#glow)">
    <polygon
      points="256,100 370,298 142,298"
      fill="none"
      stroke="url(#gold)"
      stroke-width="6"
      stroke-linejoin="round"
      opacity="0.95"
    />
  </g>

  <!-- Purple triangle pointing DOWN — rotated -2deg opposite -->
  <g transform="rotate(-2, 256, 260)" filter="url(#glow)">
    <polygon
      points="256,420 370,222 142,222"
      fill="none"
      stroke="url(#purple)"
      stroke-width="6"
      stroke-linejoin="round"
      opacity="0.95"
    />
  </g>

  <!-- The gap — small bright point -->
  <circle cx="256" cy="260" r="5" fill="#c8a84e" opacity="0.8"/>
  <circle cx="256" cy="260" r="12" fill="none" stroke="#c8a84e" stroke-width="1" opacity="0.3"/>
</svg>
