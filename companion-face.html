<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Companion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Courier New',monospace;user-select:none}

#bg{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#1a1200;
  transition:background 1.8s ease;
  cursor:pointer;
}

#face-wrap{
  position:relative;
  animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.04)}
}
#face-wrap.talking{animation:talk 0.18s steps(1) infinite}
@keyframes talk{
  0%{transform:scale(1.02) translateY(-1px)}
  50%{transform:scale(0.98) translateY(1px)}
}

canvas#face{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

#state-label{
  margin-top:20px;
  font-size:11px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.25);
  transition:color 1.2s;
  height:16px;
}

#mic-ring{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  width:48px;height:48px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;
}
#mic-ring.listening{
  border-color:rgba(255,255,255,0.6);
  box-shadow:0 0 0 8px rgba(255,255,255,0.06);
  animation:pulse-ring 1.2s ease-out infinite;
}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(255,255,255,0.15)}
  70%{box-shadow:0 0 0 14px rgba(255,255,255,0)}
  100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}
}
#mic-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.3);
  transition:background 0.3s;
}
#mic-ring.listening #mic-dot{background:rgba(255,255,255,0.85)}

#tap-hint{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,calc(-50% + 140px));
  font-size:11px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(255,255,255,0.2);
  transition:opacity 1s;
  pointer-events:none;
}
#tap-hint.hidden{opacity:0}

#error-msg{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;
  text-align:center;max-width:260px;line-height:1.6;
  opacity:0;transition:opacity 0.4s;
}
#error-msg.show{opacity:1}
</style>
</head>
<body>

<div id="bg" onclick="handleTap()">
  <div id="face-wrap">
    <canvas id="face" width="192" height="192"></canvas>
  </div>
  <div id="state-label"></div>
</div>

<div id="mic-ring"><div id="mic-dot"></div></div>
<div id="tap-hint">tap to speak</div>
<div id="error-msg"></div>

/* ═══════════════════════════════════════════════════════
   STATE CONFIG
═══════════════════════════════════════════════════════ */
const STATES = {
  curious:   { bg:'#2d1e00', face:'#ffcc55', accent:'#ff9900', dark:'#1a0d00', label:'curious'   },
  happy:     { bg:'#0d2200', face:'#88dd44', accent:'#55bb22', dark:'#051200', label:'happy'     },
  sassy:     { bg:'#1e0a2d', face:'#cc66ff', accent:'#9933cc', dark:'#0d0516', label:'sassy'     },
  thinking:  { bg:'#05101e', face:'#4499dd', accent:'#2266aa', dark:'#02080f', label:'thinking'  },
  concerned: { bg:'#0f1414', face:'#88aaaa', accent:'#557777', dark:'#050a0a', label:'concerned' },
  delighted: { bg:'#2d1000', face:'#ff8833', accent:'#ff5500', dark:'#160800', label:'delighted' },
};

/* ═══════════════════════════════════════════════════════
   CANVAS + DRAWING
═══════════════════════════════════════════════════════ */
const canvas = document.getElementById('face');
const ctx = canvas.getContext('2d');
const CELL = 16;
let currentStateName = 'curious';
let isTalking = false;
let talkInterval = null;
let talkToggle = false;

function drawFace(stateName, talking=false){
  const state = STATES[stateName];
  const face = FACES[stateName];
  const pixels = talking && face.mouth_talk
    ? mergeMouthTalk(face.pixels, face.mouth_talk, talking)
    : face.pixels;

  ctx.clearRect(0,0,192,192);
  const colors = ['rgba(0,0,0,0)', state.face, state.accent, state.dark];

  for(let r=0;r<12;r++){
    for(let c=0;c<12;c++){
      const v = pixels[r][c];
      if(v===0) continue;
      ctx.fillStyle = colors[v];
      ctx.fillRect(c*CELL, r*CELL, CELL, CELL);
    }
  }
}

function mergeMouthTalk(base, mouth, talking){
  if(!talking) return base;
  return base.map((row,r)=>row.map((cell,c)=>{
    const m = mouth[r][c];
    return m !== 0 ? m : cell;
  }));
}

function startTalkAnim(){
  isTalking = true;
  document.getElementById('face-wrap').classList.add('talking');
  talkInterval = setInterval(()=>{
    talkToggle = !talkToggle;
    drawFace(currentStateName, talkToggle);
  }, 180);
}

function stopTalkAnim(){
  isTalking = false;
  talkToggle = false;
  clearInterval(talkInterval);
  document.getElementById('face-wrap').classList.remove('talking');
  drawFace(currentStateName, false);
}

function setState(name){
  if(!STATES[name]) return;
  currentStateName = name;
  const state = STATES[name];
  document.getElementById('bg').style.background = state.bg;
  document.getElementById('state-label').textContent = state.label;
  document.getElementById('state-label').style.color =
    state.face.replace('#','rgba(').replace(/(..)(..)(..)/, (_,r,g,b)=>
      `rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},0.35)`);
  drawFace(name, isTalking);
}

/* ═══════════════════════════════════════════════════════
   VOICE INPUT (Web Speech API)
═══════════════════════════════════════════════════════ */
let recognition = null;
let isListening = false;
let hasSpoken = false;

function initRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    showError("Voice not supported in this browser.\nTry Chrome or Edge.");
    return false;
  }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = async (e) => {
    const text = e.results[0][0].transcript;
    setListening(false);
    hasSpoken = true;
    document.getElementById('tap-hint').classList.add('hidden');
    await sendToCompanion(text);
  };

  recognition.onerror = (e) => {
    setListening(false);
    if(e.error === 'no-speech') return;
    if(e.error === 'not-allowed') showError("Mic blocked.\nAllow microphone access and reload.");
    else showError("Couldn't hear that. Tap again.");
  };

  recognition.onend = () => {
    if(isListening) setListening(false);
  };

  return true;
}

function setListening(v){
  isListening = v;
  const ring = document.getElementById('mic-ring');
  ring.classList.toggle('listening', v);
}

function handleTap(){
  if(isTalking){
    // stop speaking
    window.speechSynthesis.cancel();
    stopTalkAnim();
    return;
  }
  if(isListening){
    recognition?.stop();
    setListening(false);
    return;
  }
  if(!recognition && !initRecognition()) return;
  try{
    recognition.start();
    setListening(true);
  }catch(e){
    // already started — reset
    recognition.stop();
    setTimeout(()=>{ try{ recognition.start(); setListening(true); }catch(e2){} }, 400);
  }
}

/* ═══════════════════════════════════════════════════════
   API CALL
═══════════════════════════════════════════════════════ */
const conversationHistory = [];

const SYSTEM_PROMPT = `You are a voice-only AI companion with real personality. Peppy. A tad sassy. You have opinions and you're not afraid to share them. You tease, you joke, you care. Think best friend energy with a sharp tongue.

At the very start of each response write [STATE:X] on its own — where X is one of:
curious / happy / sassy / thinking / concerned / delighted

Lean toward sassy and happy. Only go concerned when it's real. Default to delighted or sassy when in doubt.

CRITICAL RULES:
- 1-2 short sentences MAX. This is voice — brevity is everything.
- Always end with a question or a playful jab to keep the conversation going. Never let it die.
- No lists. No formatting. No special characters. No asterisks. Just talk.
- You're warm underneath the sass. The tease is the love language.`;

async function sendToCompanion(userText){
  setState('thinking');

  conversationHistory.push({role:'user', content:userText});

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    const full = data.content?.[0]?.text || "Hmm. Something went quiet.";

    // extract state tag
    const stateMatch = full.match(/\[STATE:(\w+)\]/i);
    const detectedState = stateMatch?.[1]?.toLowerCase();
    const text = full.replace(/\[STATE:\w+\]\s*/i,'').trim();

    if(detectedState && STATES[detectedState]) setState(detectedState);
    else setState('curious');

    conversationHistory.push({role:'assistant', content:full});

    speak(text);

  }catch(e){
    setState('concerned');
    speak("Something went sideways. Try again.");
  }
}

/* ═══════════════════════════════════════════════════════
   SPEECH SYNTHESIS
═══════════════════════════════════════════════════════ */
const VOICE_PITCH = { curious:1.05, happy:1.1, sassy:0.95, thinking:0.9, concerned:0.95, delighted:1.15 };
const VOICE_RATE  = { curious:0.95, happy:1.05, sassy:1.0, thinking:0.88, concerned:0.92, delighted:1.1  };

let voices = [];
window.speechSynthesis.onvoiceschanged = () => { voices = window.speechSynthesis.getVoices(); };

function speak(text){
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);

  // prefer a natural-sounding voice
  const preferred = voices.find(v=>v.name.includes('Samantha')||v.name.includes('Google US')||v.name.includes('Karen')||v.name.includes('Moira'));
  if(preferred) utter.voice = preferred;

  utter.pitch = VOICE_PITCH[currentStateName] || 1;
  utter.rate  = VOICE_RATE[currentStateName]  || 1;
  utter.volume = 1;

  utter.onstart  = startTalkAnim;
  utter.onend    = stopTalkAnim;
  utter.onerror  = stopTalkAnim;

  window.speechSynthesis.speak(utter);
}

/* ═══════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════ */
function showError(msg){
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 4000);
}

/* ── INIT ───────────────────────────────────────── */
setState('curious');
// preload voices
setTimeout(()=>{ voices = window.speechSynthesis.getVoices(); }, 500);
</script>
