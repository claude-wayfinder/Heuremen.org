<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c2a36"/>
      <stop offset="100%" stop-color="#02141a"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#c49a38" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#c49a38" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c49a38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Teal radial background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft gold halo behind the wordmark (~720px diameter) -->
  <circle cx="512" cy="560" r="360" fill="url(#halo)"/>

  <!-- Line 1 — "Memory" — gold bold serif, baseline at y=420 -->
  <text x="512" y="420"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold"
        font-size="240"
        fill="#c49a38"
        text-anchor="middle"
        textLength="780"
        lengthAdjust="spacingAndGlyphs">Memory</text>

  <!-- Line 2 — "Ai" — capital A, lowercase i — warm cream, baseline at y=700 -->
  <text x="512" y="700"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold"
        font-size="220"
        fill="#e0d8c8"
        text-anchor="middle">Ai</text>

  <!-- 8 white sparkle dots at low opacity -->
  <circle cx="180" cy="220" r="2" fill="#ffffff" opacity="0.55"/>
  <circle cx="860" cy="180" r="3" fill="#ffffff" opacity="0.65"/>
  <circle cx="120" cy="520" r="1.5" fill="#ffffff" opacity="0.45"/>
  <circle cx="920" cy="640" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="240" cy="880" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="780" cy="900" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="500" cy="120" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="600" cy="940" r="1.5" fill="#ffffff" opacity="0.5"/>
</svg>
