<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#1f5e72"/>
      <stop offset="62%" stop-color="#133e4d"/>
      <stop offset="100%" stop-color="#0c2a36"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a38" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#c49a38" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c49a38" stop-opacity="0"/>
    </radialGradient>
    <filter id="engraved" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" operator="erode" radius="1.2" result="eroded"/>
      <feComposite in="SourceAlpha" in2="eroded" operator="out" result="rim"/>
      <feFlood flood-color="#2a1d05" flood-opacity="0.7"/>
      <feComposite in2="rim" operator="in" result="darkRim"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blurAlpha"/>
      <feOffset in="blurAlpha" dx="0" dy="3" result="shiftedBlur"/>
      <feComposite in="SourceAlpha" in2="shiftedBlur" operator="out" result="topBand"/>
      <feFlood flood-color="#1f1404" flood-opacity="0.6"/>
      <feComposite in2="topBand" operator="in" result="topShadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="topShadow"/>
        <feMergeNode in="darkRim"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="430" fill="url(#halo)"/>

  <g transform="translate(-34.20, 0) scale(1.3300, 1)">
    <text x="152" y="605"
          font-family="Gloock, DejaVu Serif, Georgia, serif" font-weight="900"
          font-size="500" fill="#c49a38"
          filter="url(#engraved)">Ai</text>
  </g>

  <line x1="152" y1="668" x2="872" y2="668"
        stroke="#2a1d05" stroke-opacity="0.6" stroke-width="1" stroke-linecap="butt"/>
  <line x1="152" y1="671" x2="872" y2="671"
        stroke="#c49a38" stroke-width="6" stroke-linecap="butt"/>

  <g transform="translate(-17.30, 0) scale(1.1450, 1)">
    <text x="152" y="848"
          font-family="Gloock, DejaVu Serif, Georgia, serif" font-weight="900"
          font-size="148" fill="#c49a38"
          filter="url(#engraved)">Memory</text>
  </g>

  <circle cx="208" cy="172" r="1.6" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="852" cy="244" r="2"   fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="763" cy="138" r="1.2" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="312" cy="892" r="1.8" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="704" cy="918" r="1.4" fill="#ffffff" fill-opacity="0.4"/>
</svg>
