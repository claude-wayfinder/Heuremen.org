<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c2a36"/>
      <stop offset="100%" stop-color="#02141a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a38" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#c49a38" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c49a38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Solid background (no transparency) -->
  <rect width="1024" height="1024" fill="#02141a"/>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft gold radial glow behind the Rx -->
  <circle cx="512" cy="512" r="380" fill="url(#glow)"/>

  <!-- Subtle sparkles -->
  <circle cx="172" cy="180" r="3.5" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="868" cy="220" r="2.5" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="140" cy="640" r="4"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="912" cy="760" r="2"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="356" cy="900" r="3"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="724" cy="124" r="3.5" fill="#ffffff" fill-opacity="0.5"/>

  <!-- Hero Rx mark, centered, occupying ~60% of canvas. Built as paths so strokes are bold and consistent. -->
  <!-- Construction notes: R bowl + leg; slash through descender; superscript x to upper-right. -->
  <g transform="translate(512 512)">
    <!-- The R, serif italic, very bold -->
    <text x="-260" y="170"
          font-family="Times New Roman, Times, Georgia, serif"
          font-style="italic" font-weight="bold" font-size="620"
          fill="#c49a38">R</text>
    <!-- Slash through R's descender (classic pharmacy Rx) -->
    <line x1="-280" y1="200" x2="40" y2="356"
          stroke="#c49a38" stroke-width="34" stroke-linecap="round"/>
    <!-- Superscript x to upper right -->
    <text x="120" y="-44"
          font-family="Times New Roman, Times, Georgia, serif"
          font-style="italic" font-weight="bold" font-size="280"
          fill="#c49a38">x</text>
  </g>

  <!-- ".ai" lockup, gold, bottom-right of the Rx, ~80px wide -->
  <text x="772" y="772"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="700" font-size="74"
        fill="#c49a38" letter-spacing="-2">.ai</text>
</svg>
