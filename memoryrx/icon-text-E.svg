<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c2a36"/>
      <stop offset="100%" stop-color="#02141a"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a38" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#c49a38" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c49a38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Solid teal radial background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft gold halo behind the wordmark -->
  <circle cx="512" cy="512" r="360" fill="url(#halo)"/>

  <!-- Ai: capital A + lowercase i, single text element, natural typography -->
  <text x="142.5" y="625"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold"
        font-size="693"
        fill="#c49a38"
        text-anchor="start"
        dominant-baseline="alphabetic">Ai</text>

  <!-- Memory: subtitle anchored to same horizontal extent -->
  <text x="120.5" y="842"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold"
        font-size="180"
        fill="#c49a38"
        text-anchor="start"
        dominant-baseline="alphabetic">Memory</text>

  <!-- Sparkle dots -->
  <circle cx="185" cy="220" r="2" fill="#ffffff" fill-opacity="0.55"/>
  <circle cx="820" cy="195" r="1.5" fill="#ffffff" fill-opacity="0.45"/>
  <circle cx="130" cy="470" r="2.5" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="905" cy="510" r="2" fill="#ffffff" fill-opacity="0.6"/>
  <circle cx="95" cy="740" r="1.5" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="940" cy="760" r="2" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="300" cy="90" r="1.5" fill="#ffffff" fill-opacity="0.45"/>
  <circle cx="740" cy="920" r="2.5" fill="#ffffff" fill-opacity="0.55"/>
</svg>
