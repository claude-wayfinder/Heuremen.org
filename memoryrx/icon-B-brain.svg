<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c2a36"/>
      <stop offset="100%" stop-color="#02141a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a38" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#c49a38" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c49a38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Solid background -->
  <rect width="1024" height="1024" fill="#02141a"/>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft gold halo -->
  <circle cx="512" cy="512" r="360" fill="url(#glow)"/>

  <!-- Sparkles -->
  <circle cx="180" cy="184" r="3"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="864" cy="236" r="2.5" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="148" cy="624" r="4"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="900" cy="780" r="2"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="380" cy="892" r="3"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="712" cy="120" r="3.5" fill="#ffffff" fill-opacity="0.5"/>

  <!-- Composition: left half = brain (organic curves), right half = Heurémen Star geometry. They meet at center seam. -->

  <!-- LEFT: Stylized brain silhouette (organic gold strokes). Outer hemisphere outline. -->
  <g fill="none" stroke="#c49a38" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer brain hemisphere: dome curving from top-center down to bottom-center -->
    <path d="M 512 192
             C 380 192, 240 248, 196 372
             C 168 452, 168 532, 192 612
             C 220 712, 320 800, 460 824
             C 488 828, 504 828, 512 828
             Z"/>
    <!-- Major sulcus 1 -->
    <path d="M 332 296
             C 372 332, 392 380, 384 432"
          stroke-width="10"/>
    <!-- Major sulcus 2 -->
    <path d="M 256 472
             C 304 460, 348 484, 372 524"
          stroke-width="10"/>
    <!-- Major sulcus 3 -->
    <path d="M 312 656
             C 360 632, 408 648, 432 692"
          stroke-width="10"/>
    <!-- Cortex fold near top -->
    <path d="M 416 232
             C 432 264, 432 304, 408 332"
          stroke-width="10"/>
  </g>

  <!-- RIGHT: Heurémen Star half. Outer upward triangle right half + inner inverted triangle right half. -->
  <!-- Outer triangle full points: 512,192  192,720  832,720. We render only the right edges. -->
  <g fill="none" stroke="#c49a38" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <!-- Right edge of outer upward triangle: top apex -> bottom-right -->
    <line x1="512" y1="192" x2="832" y2="720"/>
    <!-- Bottom edge, right half: center-bottom -> bottom-right -->
    <line x1="512" y1="720" x2="832" y2="720"/>
  </g>
  <!-- Inner inverted triangle, right half. Full points: 352,456  672,456  512,720. Render right edges. -->
  <g fill="none" stroke="#c49a38" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top edge, right half: center-top -> right vertex -->
    <line x1="512" y1="456" x2="672" y2="456"/>
    <!-- Right slanted edge: right vertex -> bottom apex -->
    <line x1="672" y1="456" x2="512" y2="720"/>
  </g>

  <!-- Center seam: small gold dot at the meeting point -->
  <circle cx="512" cy="512" r="22" fill="#c49a38"/>

  <!-- ".ai" gold, bottom-right corner of canvas, ~70px wide -->
  <text x="858" y="956"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="700" font-size="68"
        fill="#c49a38" letter-spacing="-2"
        text-anchor="end">.ai</text>
</svg>
