<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0c2a36"/>
      <stop offset="100%" stop-color="#02141a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a38" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#c49a38" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c49a38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Solid background (no transparency) -->
  <rect width="1024" height="1024" fill="#02141a"/>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft gold radial glow behind the star -->
  <circle cx="512" cy="512" r="360" fill="url(#glow)"/>

  <!-- Subtle sparkles, irregular -->
  <circle cx="198" cy="176" r="3"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="848" cy="238" r="2.5" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="156" cy="612" r="4"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="902" cy="784" r="2"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="372" cy="884" r="3"   fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="704" cy="118" r="3.5" fill="#ffffff" fill-opacity="0.5"/>

  <!-- Heuremen Star: outer upward equilateral triangle -->
  <polygon points="512,85.33 142.5,725.33 881.5,725.33"
           fill="none" stroke="#c49a38" stroke-width="18" stroke-linejoin="round"/>

  <!-- Inner inverted equilateral triangle (vertices at midpoints) -->
  <polygon points="327.25,405.33 696.75,405.33 512,725.33"
           fill="none" stroke="#c49a38" stroke-width="14" stroke-linejoin="round"/>

  <!-- Center dot -->
  <circle cx="512" cy="512" r="22" fill="#c49a38"/>

  <!-- Refined Rx mark: enlarged to ~180px wide, peer to the star, lower-right of the star -->
  <g transform="translate(700, 760)">
    <!-- The R: serif italic, gold, larger -->
    <text x="0" y="142"
          font-family="Times New Roman, Times, Georgia, serif"
          font-style="italic" font-weight="bold" font-size="195"
          fill="#c49a38">R</text>
    <!-- Slash through the R's descender -->
    <line x1="-6" y1="152" x2="100" y2="206"
          stroke="#c49a38" stroke-width="11" stroke-linecap="round"/>
    <!-- Superscript x -->
    <text x="128" y="68"
          font-family="Times New Roman, Times, Georgia, serif"
          font-style="italic" font-weight="bold" font-size="88"
          fill="#c49a38">x</text>
  </g>

  <!-- ".ai" tiny gold, immediately below the Rx, ~50px wide -->
  <text x="724" y="942"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="700" font-size="48"
        fill="#c49a38" letter-spacing="-1.5">.ai</text>
</svg>
