<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0c2a36"/>
      <stop offset="60%" stop-color="#06202a"/>
      <stop offset="100%" stop-color="#02141a"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a38" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#c49a38" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c49a38" stop-opacity="0"/>
    </radialGradient>
    <filter id="engraved" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" operator="erode" radius="1.2" result="eroded"/>
      <feComposite in="SourceAlpha" in2="eroded" operator="out" result="rim"/>
      <feFlood flood-color="#2a1d05" flood-opacity="0.7"/>
      <feComposite in2="rim" operator="in" result="darkRim"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blurAlpha"/>
      <feOffset in="blurAlpha" dx="0" dy="3" result="shiftedBlur"/>
      <feComposite in="SourceAlpha" in2="shiftedBlur" operator="out" result="topBand"/>
      <feFlood flood-color="#1f1404" flood-opacity="0.6"/>
      <feComposite in2="topBand" operator="in" result="topShadow"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="topShadow"/>
        <feMergeNode in="darkRim"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Faint icy-blue wave sweeping from lower-left to upper-right -->
  <path d="M -60 490 Q 280 400, 500 290 T 1090 40"
        stroke="#a0e8f5" stroke-width="90" fill="none"
        stroke-opacity="0.12" stroke-linecap="round"/>

  <!-- LEFT THIRD: scaled G composition (x: 60–340, vertically centered) -->
  <g transform="translate(0.87, 36.2) scale(0.389)">
    <circle cx="512" cy="512" r="430" fill="url(#halo)"/>

    <g transform="translate(-34.20, 0) scale(1.3300, 1)">
      <text x="152" y="605"
            font-family="Gloock, 'DejaVu Serif', Georgia, serif" font-weight="900"
            font-size="500" fill="#c49a38"
            filter="url(#engraved)">Ai</text>
    </g>

    <line x1="152" y1="668" x2="872" y2="668"
          stroke="#2a1d05" stroke-opacity="0.6" stroke-width="1" stroke-linecap="butt"/>
    <line x1="152" y1="671" x2="872" y2="671"
          stroke="#c49a38" stroke-width="6" stroke-linecap="butt"/>

    <g transform="translate(-17.30, 0) scale(1.1450, 1)">
      <text x="152" y="848"
            font-family="Gloock, 'DejaVu Serif', Georgia, serif" font-weight="900"
            font-size="148" fill="#c49a38"
            filter="url(#engraved)">Memory</text>
    </g>
  </g>

  <!-- CENTER + RIGHT: wordmark and taglines -->
  <text x="380" y="200"
        font-family="Gloock, 'DejaVu Serif', Georgia, serif" font-weight="900"
        font-size="80" fill="#c49a38"
        filter="url(#engraved)">MemoryRxAi</text>

  <text x="380" y="290"
        font-family="Gloock, 'DejaVu Serif', Georgia, serif" font-weight="400"
        font-size="32" fill="#e0d8c8">AI that reads the room</text>

  <text x="380" y="345"
        font-family="Gloock, 'DejaVu Serif', Georgia, serif" font-weight="400"
        font-style="italic" font-size="22" fill="#a0e8f5">End the digital amnesia.</text>

  <!-- 12 small white sparkle dots, asymmetric -->
  <circle cx="125" cy="48"  r="1.4" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="448" cy="78"  r="1.8" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="702" cy="42"  r="1.2" fill="#ffffff" fill-opacity="0.6"/>
  <circle cx="952" cy="118" r="1.6" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="218" cy="432" r="1.5" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="612" cy="448" r="1.2" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="852" cy="378" r="2.0" fill="#ffffff" fill-opacity="0.55"/>
  <circle cx="982" cy="262" r="1.3" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="382" cy="438" r="1.7" fill="#ffffff" fill-opacity="0.45"/>
  <circle cx="522" cy="62"  r="1.1" fill="#ffffff" fill-opacity="0.4"/>
  <circle cx="782" cy="222" r="1.4" fill="#ffffff" fill-opacity="0.5"/>
  <circle cx="62"  cy="238" r="1.6" fill="#ffffff" fill-opacity="0.4"/>
</svg>
